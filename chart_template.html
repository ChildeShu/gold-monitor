<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>金价走势</title>
<script src="chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
  background:#0e0e1a;color:#e0e0e0;
  -webkit-font-smoothing:antialiased;
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
}
.header{
  flex-shrink:0;padding:7px 14px 3px;
  background:#0e0e1a;position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;height:28px;
}
.header-title{font-size:14px;font-weight:600;color:#fff;letter-spacing:0.3px}
.header-date{font-size:11px;color:#888;font-variant-numeric:tabular-nums}
.tabs{
  flex-shrink:0;display:flex;gap:0;padding:0 6px;
  background:#0e0e1a;position:relative;z-index:9;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,0.04);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:7px 12px 5px;
  font-size:13px;font-weight:500;cursor:pointer;
  color:#666;position:relative;white-space:nowrap;
  transition:color 0.2s;
}
.tab.active{color:#d4af37;font-weight:600}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:12px;right:12px;
  height:2px;background:#d4af37;border-radius:1px;
}
.chart-stage{
  flex:1 1 auto;min-height:0;
  position:relative;width:100%;
  background:#0e0e1a;overflow:hidden;
}
.chart-area{position:absolute;top:0;left:0;right:0;bottom:0;touch-action:none}
canvas#chart{width:100%!important;height:100%!important;display:block;touch-action:none}

/* ===== 竖线（金色虚线 + 底部时间标签）===== */
.cross-line{
  position:absolute;top:0;bottom:0;width:0;left:0;
  pointer-events:none;display:none;z-index:20;
}
.cross-line .cl-dash{
  position:absolute;left:50%;top:0;bottom:0;
  width:1px;
  background:repeating-linear-gradient(
    to bottom,
    rgba(212,175,55,0.8) 0px,
    rgba(212,175,55,0.8) 4px,
    transparent 4px,
    transparent 8px
  );
  transform:translateX(-50%);
}
/* 底部时间 */
.cross-line .cl-time{
  position:absolute;left:50%;bottom:2px;transform:translateX(-50%);
  font-size:10px;font-weight:600;
  background:rgba(212,175,55,0.95);color:#0e0e1a;
  padding:1px 7px;border-radius:4px;
  font-variant-numeric:tabular-nums;white-space:nowrap;
  pointer-events:none;
}

/* 竖线旁价格标签：挨着数据点，放在数据点下方优先 */
.price-tag{
  position:absolute;left:0;top:0;
  display:flex;align-items:center;gap:4px;
  padding:2px 6px;border-radius:4px;
  font-size:11px;font-weight:700;
  background:rgba(14,14,26,0.94);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;
  pointer-events:none;
  box-shadow:0 1px 6px rgba(0,0,0,0.5);
  font-variant-numeric:tabular-nums;z-index:21;
  white-space:nowrap;
}
.price-tag .pt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.price-tag .pt-text{font-weight:700;font-variant-numeric:tabular-nums}

/* 高亮圆点：标记竖线与数据线的实际交点 */
.highlight-dot{
  position:absolute;left:0;top:0;
  width:8px;height:8px;border-radius:50%;
  border:2px solid #fff;
  box-shadow:0 0 0 2px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.5);
  pointer-events:none;z-index:21;
  /* 不用 transform，直接用 left/top 定位圆心 */
}

.legend-bar{
  flex-shrink:0;display:flex;gap:4px;
  padding:5px 8px;background:#0e0e1a;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  border-top:1px solid rgba(255,255,255,0.04);
}
.legend-bar::-webkit-scrollbar{display:none}
.legend-item{
  flex-shrink:0;display:flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:10px;font-size:10px;cursor:pointer;
  background:rgba(255,255,255,0.04);border:1px solid transparent;
  transition:all 0.15s;color:#888;
}
.legend-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-item.active{color:#fff;border-color:rgba(212,175,55,0.4);background:rgba(212,175,55,0.08)}
.legend-item.dimmed{opacity:0.3}

.tap-hint{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:12px;color:#444;
  pointer-events:none;text-align:center;line-height:1.6;
  transition:opacity 0.3s;z-index:5;
}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">金价走势</div>
  <div class="header-date" id="headerDate">--</div>
</div>
<div class="tabs" id="tabs"></div>
<div class="chart-stage">
  <div class="chart-area" id="chartArea">
    <canvas id="chart"></canvas>
    <div class="cross-line" id="crossLine">
      <div class="cl-dash"></div>
      <div class="cl-time" id="clTime"></div>
    </div>
    <div class="tap-hint" id="tapHint">← 在图表上滑动查看 →<br><span id="errorBox" style="color:#ff6b6b;display:none"></span></div>
  </div>
</div>
<div class="legend-bar" id="legendBar"></div>

<script>
var RAW_DATA = __DATA_PLACEHOLDER__;
var GEN_TIME = "__GEN_TIME__";

var GROUPS = {
  "国际": {label:"国际", series:[
    {key:"intl_spot_cny",label:"国际金价(人民币)",unit:"元/克",color:"#ff6b6b",decimals:2,axis:"y"},
    {key:"intl_spot_usd",label:"国际金价(美元)",unit:"美元/盎司",color:"#ffa502",decimals:1,axis:"y1"}
  ]},
  "投资": {label:"投资", series:[
    {key:"au9999",label:"AU9999",unit:"元/克",color:"#2eed57",decimals:2,axis:"y"},
    {key:"boshi_etf",label:"博时黄金ETF",unit:"元/克",color:"#1e90ff",decimals:2,axis:"y"}
  ]},
  "基金": {label:"基金", series:[
    {key:"fund_002610",label:"博时黄金",unit:"元/克",color:"#ff6348",decimals:2,axis:"y"},
    {key:"fund_000216",label:"华安黄金",unit:"元/克",color:"#7bed9f",decimals:2,axis:"y"},
    {key:"fund_002963",label:"易方达黄金",unit:"元/克",color:"#70a1ff",decimals:2,axis:"y"},
    {key:"fund_000218",label:"国泰黄金",unit:"元/克",color:"#ffa502",decimals:2,axis:"y"},
    {key:"fund_000929",label:"博时黄金D",unit:"元/克",color:"#a4b0be",decimals:2,axis:"y"}
  ]},
  "品牌": {label:"品牌", series:[
    {key:"brand_周大福",label:"周大福",unit:"元/克",color:"#eccc68",decimals:0,axis:"y"},
    {key:"brand_老庙黄金",label:"老庙黄金",unit:"元/克",color:"#ff7f50",decimals:0,axis:"y"},
    {key:"brand_周六福",label:"周六福",unit:"元/克",color:"#ff6b81",decimals:0,axis:"y"},
    {key:"brand_老凤祥",label:"老凤祥",unit:"元/克",color:"#a29bfe",decimals:0,axis:"y"},
    {key:"brand_中国黄金",label:"中国黄金",unit:"元/克",color:"#dfe6e9",decimals:0,axis:"y"},
    {key:"brand_潮宏基",label:"潮宏基",unit:"元/克",color:"#55efc4",decimals:0,axis:"y"},
    {key:"brand_金至尊",label:"金至尊",unit:"元/克",color:"#74b9ff",decimals:0,axis:"y"},
    {key:"brand_谢瑞麟",label:"谢瑞麟",unit:"元/克",color:"#fab1a0",decimals:0,axis:"y"},
    {key:"brand_六福珠宝",label:"六福珠宝",unit:"元/克",color:"#81ecec",decimals:0,axis:"y"},
    {key:"brand_周生生",label:"周生生",unit:"元/克",color:"#fdcb6e",decimals:0,axis:"y"}
  ]}
};

/* ===== 全局状态 ===== */
var gChart = null;
var gCurrentGroup = "国际";
var gHighlightedSeries = null;
var gLastCrossIdx = -1;
var gHideTimer = null;
var gTapHint = null;
var gChartArea = null;
var gCrossLine = null;
var gClTime = null;
var gLegendBar = null;
var gParsedData = null;
var gIsDown = false;
var gRafId = null;
var gPendingCssX = null;
var gTabSwipeHandled = false;

/* ===== 数据解析 ===== */
function parseData() {
  try {
    var labels = [], datasets = {};
    for (var gi in GROUPS)
      for (var si in GROUPS[gi].series) datasets[GROUPS[gi].series[si].key] = [];
    var allKeys = Object.keys(RAW_DATA).sort();
    allKeys.forEach(function(k){
      var d = RAW_DATA[k]; labels.push(k);
      if (d && d.intl_spot) {
        datasets["intl_spot_cny"].push(d.intl_spot.cny_price || null);
        datasets["intl_spot_usd"].push(d.intl_spot.intl_price || null);
      } else { datasets["intl_spot_cny"].push(null); datasets["intl_spot_usd"].push(null); }
      datasets["au9999"].push(d && d.au9999 ? d.au9999.price : null);
      datasets["boshi_etf"].push(d && d.boshi_etf ? d.boshi_etf.price * 100 : null);
      var fc = ["002610","000216","002963","000218","000929"];
      if (d && d.gold_funds) {
        fc.forEach(function(c){ datasets["fund_"+c].push(d.gold_funds[c]?d.gold_funds[c].gold_price:null); });
      } else { fc.forEach(function(c){ datasets["fund_"+c].push(null); }); }
      var found = {};
      if (d && d.brands) {
        for (var b in d.brands) { if(!b) continue; var k2="brand_"+b; if(datasets[k2]!==undefined){ datasets[k2].push(d.brands[b]); found[k2]=true; } }
        for (var gi in GROUPS) for (var si in GROUPS[gi].series) { var s=GROUPS[gi].series[si]; if(s.key.indexOf("brand_")===0 && !found[s.key]) datasets[s.key].push(null); }
      } else {
        for (var gi in GROUPS) for (var si in GROUPS[gi].series) { if(GROUPS[gi].series[si].key.indexOf("brand_")===0) datasets[GROUPS[gi].series[si].key].push(null); }
      }
    });
    return { labels: labels, rawLabels: labels, datasets: datasets };
  } catch (err) {
    logError("parseData", err);
    return { labels: [], rawLabels: [], datasets: {} };
  }
}

/* ===== 坐标转换工具 ===== */
function cssToCanvasX(cssX, dprX) {
  if (dprX === undefined) {
    var r = gChart.canvas.getBoundingClientRect();
    dprX = gChart.canvas.width / r.width;
  }
  return cssX * dprX;
}
function canvasToCssX(canvasX, dprX) {
  if (dprX === undefined) {
    var r = gChart.canvas.getBoundingClientRect();
    dprX = gChart.canvas.width / r.width;
  }
  return canvasX / dprX;
}
function canvasToCssY(canvasY, dprY) {
  if (dprY === undefined) {
    var r = gChart.canvas.getBoundingClientRect();
    dprY = gChart.canvas.height / r.height;
  }
  return canvasY / dprY;
}

/* ===== 根据 X 像素位置找数据点索引 ===== */
function getIndexAtCanvasX(canvasX) {
  var xs = gChart.scales.x;
  if (!xs) return -1;
  var n = gChart.data.labels.length;
  if (n === 0) return -1;
  var L = xs.getPixelForValue(0);
  var R = xs.getPixelForValue(n - 1);
  if (canvasX <= L) return 0;
  if (canvasX >= R) return n - 1;
  for (var i = 0; i < n - 1; i++) {
    var p0 = xs.getPixelForValue(i);
    var p1 = xs.getPixelForValue(i + 1);
    if (canvasX <= (p0 + p1) / 2) return i;
  }
  return n - 1;
}

/* ===== 构建 dataset ===== */
function buildDatasets(data, groupName) {
  var group = GROUPS[groupName];
  return group.series.map(function(s){
    return {
      label: s.label, data: data.datasets[s.key],
      borderColor: s.color, backgroundColor: s.color + "15",
      borderWidth: 1.8, pointRadius: 0, pointHoverRadius: 4,
      pointHoverBackgroundColor: s.color, pointHoverBorderColor: "#fff", pointHoverBorderWidth: 1.5,
      tension: 0.3, fill: false,
      yAxisID: s.axis, spanGaps: false,
      unit: s.unit, decimals: s.decimals, seriesKey: s.key
    };
  });
}

/* ===== Y 轴配置 ===== */
function getScales(groupName) {
  var showY1 = (groupName === "国际");
  var scales = {
    x: {
      type: "category", grid: { color: "rgba(255,255,255,0.03)" },
      border: { color: "rgba(255,255,255,0.1)" },
      ticks: {
        color: "#888", font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 5, padding: 2,
        callback: function(v) {
          var lbl = this.getLabelForValue(v);
          if (!lbl) return "";
          var p = lbl.split(" "); return p[0].slice(5) + " " + p[1].slice(0,5);
        }
      }
    },
    y: {
      type: "linear", position: "left",
      grid: { color: "rgba(255,255,255,0.04)" },
      border: { color: "rgba(255,255,255,0.1)" },
      ticks: { color: "#888", font: { size: 9 }, maxTicksLimit: 5, padding: 4, callback: function(v){ return v.toFixed(0); } }
    }
  };
  scales.y1 = {
    type: "linear", display: showY1, position: "right",
    grid: { drawOnChartArea: false },
    border: { color: "rgba(255,255,255,0.1)" },
    ticks: { color: "#ffa502", font: { size: 9 }, maxTicksLimit: 5, padding: 4, callback: function(v){ return v.toFixed(0); } }
  };
  return scales;
}

/* ===== 错误显示工具 ===== */
function showError(msg) {
  var eb = document.getElementById("errorBox");
  var ta = document.getElementById("tapHint");
  if (eb) { eb.textContent = "\u274C " + msg; eb.style.display = "inline"; }
  if (ta) { ta.style.opacity = "1"; }
  console.error(msg);
}
function logError(prefix, err) {
  console.error(prefix, err);
  try {
    var stack = err && err.stack ? err.stack : String(err);
    showError(prefix + " " + (err && err.message ? err.message : err) + (stack ? " | " + stack.split("\n").slice(0,2).join(" ") : ""));
  } catch (_) {}
}
window.addEventListener("error", function(e){
  var msg = e.message || "";
  if (msg === "Script error." || (!e.filename && !e.lineno)) {
    showError("页面脚本异常，请尝试刷新。若持续出现请截图反馈。");
  } else {
    showError("全局错误: " + msg + " @ " + (e.filename||"") + ":" + (e.lineno||""));
  }
  console.error("window.onerror", e);
});
window.addEventListener("unhandledrejection", function(e){
  showError("Promise 错误: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
});

/* ===== 渲染图表 ===== */
function renderChart(groupName) {
  try {
    if (gRafId) { cancelAnimationFrame(gRafId); gRafId = null; }
    gPendingCssX = null;
    gIsDown = false;
    gCurrentGroup = groupName;
    gParsedData = parseData();
    if (gChart) { gChart.destroy(); gChart = null; }
    var ctx = document.getElementById("chart").getContext("2d");
    gChart = new Chart(ctx, {
      type: "line",
      data: { labels: gParsedData.labels, datasets: buildDatasets(gParsedData, groupName) },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        layout: { padding: { top: 8, right: 10, bottom: 4, left: 6 } },
        interaction: { mode: "index", axis: "x", intersect: false },
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: getScales(groupName),
        events: []
      }
    });
    document.getElementById("headerDate").textContent =
      gParsedData.rawLabels[0].slice(5) + " ~ " + gParsedData.rawLabels[gParsedData.rawLabels.length-1].slice(5);
    renderTabs();
    renderLegendBar();
    gLastCrossIdx = -1;
    if (gCrossLine) gCrossLine.style.display = "none";
    if (gClTime) gClTime.style.display = "none";
    removeCrosshairDetails();
    if (gTapHint) gTapHint.style.opacity = "1";
  } catch (err) {
    logError("renderChart", err);
  }
}

/* ===== Tabs ===== */
function renderTabs() {
  var tabs = document.getElementById("tabs");
  var keys = Object.keys(GROUPS);
  tabs.innerHTML = keys.map(function(k){
    return '<div class="tab' + (k === gCurrentGroup ? " active" : "") + '" data-group="' + k + '">' + GROUPS[k].label + '</div>';
  }).join("");
  [].forEach.call(tabs.querySelectorAll(".tab"), function(el){
    el.addEventListener("click", function(e){
      try {
        if (gTabSwipeHandled) { gTabSwipeHandled = false; return; }
        renderChart(el.dataset.group);
      } catch (err) { logError("tab click", err); }
    });
  });
}

/* ===== Legend ===== */
function renderLegendBar() {
  var group = GROUPS[gCurrentGroup];
  var bar = document.getElementById("legendBar");
  bar.innerHTML = group.series.map(function(s){
    var isActive = !gHighlightedSeries || gHighlightedSeries === s.key;
    return '<div class="legend-item' + (isActive ? " active" : "") + (!isActive ? " dimmed" : "") + '" data-key="' + s.key + '">' +
      '<span class="dot" style="background:' + s.color + '"></span>' + s.label + '</div>';
  }).join("");
  [].forEach.call(bar.querySelectorAll(".legend-item"), function(el){
    el.addEventListener("click", function(){
      try { toggleHighlight(el.dataset.key); } catch (err) { logError("legend click", err); }
    });
  });
}

function toggleHighlight(key) {
  try {
    gHighlightedSeries = (gHighlightedSeries === key) ? null : key;
    gChart.data.datasets.forEach(function(ds, i){
      var meta = gChart.getDatasetMeta(i);
      meta.hidden = (!gHighlightedSeries || ds.seriesKey === gHighlightedSeries) ? false : true;
    });
    gChart.update();
    renderLegendBar();
  } catch (err) {
    logError("toggleHighlight", err);
  }
}

/* ===== 竖线 + 价格标签（挨着数据点，优先下方） ===== */

function showCrosshair(cssX, idx, dprX, dprY) {
  try {
    if (!gChart || !gChart.chartArea || !gCrossLine || !gClTime || !gParsedData) return;

    /*
     * cssX 来自 getCssXFromTouch/Mouse = e.clientX - canvas.getBoundingClientRect().left
     * 这是相对于 canvas 左边缘的 CSS 像素。
     *
     * 竖线和标签都在 #chartArea（canvas父div）里。
     * 需要知道 canvas 在 #chartArea 内的位置偏移。
     */
    var canvasRect = gChart.canvas.getBoundingClientRect();
    var areaRect = gChartArea.getBoundingClientRect();
    var offsetX = canvasRect.left - areaRect.left;
    /* 竖线的 X = cssX + offsetX (chartArea坐标系) */
    var areaCssX = cssX + offsetX;

    gCrossLine.style.left = areaCssX + "px";
    gCrossLine.style.display = "block";

    /* 底部时间 */
    var label = gParsedData.rawLabels[idx];
    var p = label.split(" ");
    gClTime.textContent = p[0].slice(5) + " " + p[1].slice(0,5);
    gClTime.style.display = "block";

    /* 更新竖线旁价格标签 —— 传入 chartArea 坐标系的 X */
    updatePriceTags(areaCssX, idx);
  } catch (err) {
    logError("showCrosshair", err);
  }
}

function updatePriceTags(cssX, idx) {
  try {
    if (!gChart || !gChartArea || !gParsedData) return;
    var ca = gChart.chartArea;
    if (!ca) return;
    var group = GROUPS[gCurrentGroup];
    var dsIndexMap = {};
    gChart.data.datasets.forEach(function(ds, i){ if(ds.seriesKey) dsIndexMap[ds.seriesKey] = i; });

    /* 清理旧元素 */
    var existing = {};
    var oldTags = gChartArea.querySelectorAll(".price-tag");
    [].forEach.call(oldTags, function(el){ existing[el.dataset.key] = el; });
    var existingDots = {};
    var oldDots = gChartArea.querySelectorAll(".highlight-dot");
    [].forEach.call(oldDots, function(el){ existingDots[el.dataset.key] = el; });

    /*
     * 坐标转换：canvas物理像素 → chartArea CSS坐标
     * 每次重新计算 DPR，避免传入值在手机端高 DPI / 布局变化时不准
     */
    var canvasRect = gChart.canvas.getBoundingClientRect();
    var areaRect = gChartArea.getBoundingClientRect();
    var cOffsetX = canvasRect.left - areaRect.left;
    var cOffsetY = canvasRect.top - areaRect.top;
    var areaW = gChartArea.offsetWidth;
    var areaH = gChartArea.offsetHeight;
    /* 在函数内部重新取 DPR，不依赖外部传入 */
    var _dprX = gChart.canvas.width / canvasRect.width;
    var _dprY = gChart.canvas.height / canvasRect.height;

    /* 收集所有可见 series 的数据点信息 */
    var items = [];
    for (var si = 0; si < group.series.length; si++) {
      var s = group.series[si];
      var dsIdx = dsIndexMap[s.key];
      if (dsIdx === undefined) continue;
      var meta = gChart.getDatasetMeta(dsIdx);
      if (meta && meta.hidden) continue;
      var v = gParsedData.datasets[s.key][idx];
      if (v === null || v === undefined) continue;

      var pt = meta.data && meta.data[idx];
      if (!pt || typeof pt.x !== "number" || typeof pt.y !== "number") continue;

      var x = pt.x / _dprX + cOffsetX;
      var y = pt.y / _dprY + cOffsetY;

      items.push({key: s.key, color: s.color, value: v, decimals: s.decimals, unit: s.unit, x: x, y: y});
    }

    if (items.length === 0) return;

    /* 按 Y 从小到大排序 */
    items.sort(function(a, b){ return a.y - b.y; });

    var DOT_R = 4;
    var MARGIN = 6;
    var TAG_SPACING = 2;

    /* 先创建所有标签获取真实尺寸 */
    var rawTags = [];
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var tag = existing[it.key];
      if (tag) {
        delete existing[it.key];
      } else {
        tag = document.createElement("div");
        tag.className = "price-tag";
        tag.dataset.key = it.key;
        gChartArea.appendChild(tag);
      }
      tag.innerHTML = '<span class="pt-dot" style="background:' + it.color + '"></span><span class="pt-text" style="color:' + it.color + '">' + it.value.toFixed(it.decimals) + " " + it.unit + '</span>';
      tag.style.display = "flex";
      tag.style.visibility = "hidden";
      tag.style.left = "0px"; tag.style.top = "0px";
      tag.style.transform = "none";
      rawTags.push({tag: tag, item: it, w: tag.offsetWidth || 80, h: tag.offsetHeight || 20});
    }

    /*
     * 布局：标签紧贴圆点，不重叠
     * 策略：
     *   - 每个标签紧贴自己对应的数据点（圆点旁边2px）
     *   - 碰撞检测，重叠时自动推开
     */

    /* 左右偏好 */
    var maxTw = 0;
    for (var i = 0; i < rawTags.length; i++) { if (rawTags[i].w > maxTw) maxTw = rawTags[i].w; }
    var rightSpace = areaW - (items[items.length - 1].x + DOT_R);
    var preferRight = (rightSpace >= maxTw + MARGIN);

    /* 初始位置：每个标签紧贴自己的圆点 */
    var placements = [];
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var rt = rawTags[i];
      var tw = rt.w;
      var th = rt.h;

      /* 默认放右边 */
      var tagLeft = it.x + DOT_R + 2;
      var tagTop = it.y + DOT_R + 2;

      /* 右边不够 → 放左边 */
      if (tagLeft + tw > areaW - MARGIN) {
        tagLeft = it.x - DOT_R - tw - 2;
      }

      placements.push({left: tagLeft, top: tagTop, w: tw, h: th});
    }

    /* 碰撞检测：从上往下逐对检查，有碰撞就向下推 */
    for (var i = 0; i < placements.length; i++) {
      for (var j = i + 1; j < placements.length; j++) {
        var a = placements[i];
        var b = placements[j];

        var overlapX = !(a.left + a.w + TAG_SPACING < b.left || b.left + b.w + TAG_SPACING < a.left);
        var overlapY = !(a.top + a.h + TAG_SPACING < b.top || b.top + b.h + TAG_SPACING < a.top);

        if (overlapX && overlapY) {
          b.top = a.top + a.h + TAG_SPACING;
        }
      }
    }

    /* 应用位置 + 边界钳制 */
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var rt = rawTags[i];
      var pl = placements[i];

      var dot = existingDots[it.key];
      if (dot) { delete existingDots[it.key]; }
      else {
        dot = document.createElement("div");
        dot.className = "highlight-dot"; dot.dataset.key = it.key;
        gChartArea.appendChild(dot);
      }
      dot.style.backgroundColor = it.color;
      /* 圆点边界钳制：保证在 chartArea 绘制区域内 */
      var dotX = Math.max(MARGIN, Math.min(it.x - DOT_R, areaW - MARGIN - DOT_R * 2));
      var dotY = Math.max(MARGIN, Math.min(it.y - DOT_R, areaH - MARGIN - DOT_R * 2));
      dot.style.left = dotX + "px";
      dot.style.top = dotY + "px";
      dot.style.display = (gHighlightedSeries && gHighlightedSeries !== it.key) ? "none" : "block";

      /* 标签边界保护 */
      var fTop = pl.top;
      var fLeft = pl.left;
      if (fLeft < MARGIN) fLeft = MARGIN;
      if (fLeft + pl.w > areaW - MARGIN) fLeft = areaW - MARGIN - pl.w;
      if (fTop < MARGIN) fTop = it.y + DOT_R + 2;
      if (fTop + pl.h > areaH - MARGIN) fTop = areaH - MARGIN - pl.h;

      rt.tag.style.visibility = "visible";
      rt.tag.style.left = Math.round(fLeft) + "px";
      rt.tag.style.top = Math.round(fTop) + "px";
    }

    /* 移除多余旧元素 */
    Object.keys(existing).forEach(function(k){ try{existing[k].remove();}catch(_){} });
    Object.keys(existingDots).forEach(function(k){ try{existingDots[k].remove();}catch(_){} });
  } catch (err) {
    logError("updatePriceTags", err);
  }
}

function moveCrosshairOnly(cssX) {
  try {
    if (!gChartArea || !gCrossLine || !gChart) return;
    var canvasEl = gChart.canvas;
    var canvasRect = canvasEl.getBoundingClientRect();
    var areaRect = gChartArea.getBoundingClientRect();
    var offsetX = canvasRect.left - areaRect.left;

    /* 竖线：cssX 是相对于 canvas 的，需要加偏移 */
    gCrossLine.style.left = (cssX + offsetX) + "px";

    /* 标签跟随竖线，保持左右侧策略；圆点保持在数据点位置不随竖线平移 */
    var tags = gChartArea.querySelectorAll(".price-tag");
    var areaW = areaRect.width;
    [].forEach.call(tags, function(el){
      var tw = el.offsetWidth || 80;
      var newLeft = cssX + offsetX + 10;
      if (newLeft + tw + 4 > areaW && cssX + offsetX - tw - 10 >= 0) {
        newLeft = cssX + offsetX - tw - 10;
      }
      el.style.left = newLeft + "px";
    });
  } catch (err) {
    logError("moveCrosshairOnly", err);
  }
}

function removeCrosshairDetails() {
  try {
    var tags = gChartArea.querySelectorAll(".price-tag");
    [].forEach.call(tags, function(el){ el.remove(); });
    var dots = gChartArea.querySelectorAll(".highlight-dot");
    [].forEach.call(dots, function(el){ el.remove(); });
  } catch (err) {
    logError("removeCrosshairDetails", err);
  }
}

/* ===== Tab 栏左右滑动切换 ===== */
function bindTabSwipe() {
  var tabs = document.getElementById("tabs");
  var startX = 0, startY = 0;
  var SWIPE_THRESHOLD = 50;

  tabs.addEventListener("touchstart", function(e){
    try {
      if (!e.touches || e.touches.length === 0) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    } catch (err) { logError("tab touchstart", err); }
  }, {passive: true});

  tabs.addEventListener("touchend", function(e){
    try {
      if (startX === 0) return;
      if (!e.changedTouches || e.changedTouches.length === 0) { startX = 0; return; }
      var endX = e.changedTouches[0].clientX;
      var endY = e.changedTouches[0].clientY;
      var dx = endX - startX;
      var dy = endY - startY;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE_THRESHOLD) {
        var keys = Object.keys(GROUPS);
        var idx = keys.indexOf(gCurrentGroup);
        if (idx < 0) { startX = 0; return; }
        gTabSwipeHandled = true;
        if (dx < 0 && idx < keys.length - 1) {
          renderChart(keys[idx + 1]);
        } else if (dx > 0 && idx > 0) {
          renderChart(keys[idx - 1]);
        } else {
          gTabSwipeHandled = false;
        }
      }
      startX = 0;
    } catch (err) { logError("tab touchend", err); startX = 0; }
  }, {passive: true});
}

function bindLegendSwipe() {
  var bar = document.getElementById("legendBar");
  if (!bar) return;
  var startX = 0, startY = 0;
  var SWIPE_THRESHOLD = 40;

  bar.addEventListener("touchstart", function(e){
    try {
      if (!e.touches || e.touches.length === 0) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    } catch (err) { logError("legend touchstart", err); }
  }, {passive: true});

  bar.addEventListener("touchend", function(e){
    try {
      if (startX === 0) return;
      if (!e.changedTouches || e.changedTouches.length === 0) { startX = 0; return; }
      var endX = e.changedTouches[0].clientX;
      var endY = e.changedTouches[0].clientY;
      var dx = endX - startX;
      var dy = endY - startY;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE_THRESHOLD) {
        var group = GROUPS[gCurrentGroup];
        var keys = group.series.map(function(s){ return s.key; });
        if (keys.length === 0) { startX = 0; return; }
        var idx = keys.indexOf(gHighlightedSeries);

        if (dx < 0) {
          idx = (idx + 1 >= keys.length) ? 0 : idx + 1;
        } else {
          idx = (idx - 1 < 0) ? keys.length - 1 : idx - 1;
        }
        toggleHighlight(keys[idx]);
      }
      startX = 0;
    } catch (err) { logError("legend touchend", err); startX = 0; }
  }, {passive: true});
}

/* ===== 触摸 / 鼠标事件 ===== */
function bindEvents() {
  if (!gChartArea) return;

  function getCssXFromTouch(e) {
    try {
      if (e.touches && e.touches.length > 0 && gChart && gChart.canvas) {
        return e.touches[0].clientX - gChart.canvas.getBoundingClientRect().left;
      }
    } catch (err) { logError("getCssXFromTouch", err); }
    return null;
  }
  function getCssXFromMouse(e) {
    try {
      if (gChart && gChart.canvas) {
        return e.clientX - gChart.canvas.getBoundingClientRect().left;
      }
    } catch (err) { logError("getCssXFromMouse", err); }
    return null;
  }

  function scheduleMove(cssX) {
    gPendingCssX = cssX;
    if (gRafId) return;
    gRafId = requestAnimationFrame(function(){
      gRafId = null;
      var x = gPendingCssX;
      gPendingCssX = null;
      if (x !== null) onMove(x);
    });
  }

  gChartArea.addEventListener("touchstart", function(e){
    try {
      if (!e.touches || e.touches.length === 0) return;
      gIsDown = true;
      clearTimeout(gHideTimer);
      var cssX = getCssXFromTouch(e);
      if (cssX !== null) scheduleMove(cssX);
      if (e.cancelable) e.preventDefault();
    } catch (err) { logError("chart touchstart", err); }
  }, {passive:false});

  /* touchmove/touchend 绑在 document 上，防止手指滑出 chartArea 后丢失追踪 */
  document.addEventListener("touchmove", function(e){
    try {
      if (!gIsDown || !e.touches || e.touches.length === 0) return;
      var cssX = getCssXFromTouch(e);
      if (cssX !== null) scheduleMove(cssX);
      if (e.cancelable) e.preventDefault();
    } catch (err) { logError("document touchmove", err); }
  }, {passive:false});

  document.addEventListener("touchend", function(e){
    try { onEnd(); } catch (err) { logError("document touchend", err); }
  });
  document.addEventListener("touchcancel", function(e){
    try { onEnd(); } catch (err) { logError("document touchcancel", err); }
  });

  gChartArea.addEventListener("mousedown", function(e){
    try {
      gIsDown = true;
      clearTimeout(gHideTimer);
      var x = getCssXFromMouse(e);
      if (x !== null) onMove(x);
    } catch (err) { logError("chart mousedown", err); }
  });

  document.addEventListener("mousemove", function(e){
    try {
      if (!gIsDown) return;
      var x = getCssXFromMouse(e);
      if (x !== null) scheduleMove(x);
    } catch (err) { logError("document mousemove", err); }
  });

  document.addEventListener("mouseup", function(e){
    try { onEnd(); } catch (err) { logError("document mouseup", err); }
  });
  document.addEventListener("mouseleave", function(e){
    try { if (gIsDown) onEnd(); } catch (err) { logError("document mouseleave", err); }
  });
}

function onMove(cssX) {
  try {
    if (!gChart || !gChart.chartArea || !gChart.canvas || !gParsedData) return;

    var rect = gChart.canvas.getBoundingClientRect();
    if (!rect || rect.width === 0 || rect.height === 0) return;
    var dprX = gChart.canvas.width / rect.width;
    var dprY = gChart.canvas.height / rect.height;

    /* 将交互 X 限制在 chartArea 绘制边界内，避免竖线出界 */
    var ca = gChart.chartArea;
    var chartLeftCss = ca.left / dprX;
    var chartRightCss = ca.right / dprX;
    var clampedCssX = Math.max(chartLeftCss, Math.min(cssX, chartRightCss));

    var canvasX = cssToCanvasX(clampedCssX, dprX);
    var clampedCanvasX = Math.max(ca.left, Math.min(canvasX, ca.right));
    var idx = getIndexAtCanvasX(clampedCanvasX);
    if (idx < 0) return;

    if (idx !== gLastCrossIdx) {
      gLastCrossIdx = idx;
      showCrosshair(clampedCssX, idx, dprX, dprY);
      if (gTapHint) gTapHint.style.opacity = "0";
    } else {
      moveCrosshairOnly(clampedCssX);
    }
  } catch (err) {
    logError("onMove", err);
  }
}

function onEnd() {
  try {
    gIsDown = false;
    clearTimeout(gHideTimer);
    gHideTimer = setTimeout(function(){
      try {
        gCrossLine.style.display = "none";
        gClTime.style.display = "none";
        removeCrosshairDetails();
        gLastCrossIdx = -1;
        if (gTapHint) gTapHint.style.opacity = "1";
      } catch (err) { logError("onEnd timeout", err); }
    }, 2000);
  } catch (err) {
    logError("onEnd", err);
  }
}

/* ===== 页面加载后自动刷新最新数据 ===== */
function fetchLatest() {
  try {
    if (typeof fetch === "undefined") return;
    var url = "latest.json?_t=" + Date.now();
    fetch(url, { cache: "no-store" })
      .then(function(r) { return r.json(); })
      .then(function(latest) {
        if (!latest || typeof latest !== "object") return;
        var keys = Object.keys(latest);
        if (keys.length === 0) return;
        var latestKey = keys[0];
        var latestData = latest[latestKey];
        if (!latestData) return;

        var rawKeys = Object.keys(RAW_DATA);
        if (rawKeys.length === 0) {
          RAW_DATA[latestKey] = latestData;
        } else {
          var lastKey = rawKeys[rawKeys.length - 1];
          if (latestKey > lastKey) {
            RAW_DATA[latestKey] = latestData;
          } else if (latestKey === lastKey) {
            RAW_DATA[latestKey] = latestData;
          }
        }

        var all = Object.keys(RAW_DATA).sort();
        if (all.length > 1000) {
          var keep = all.slice(-1000);
          var trimmed = {};
          keep.forEach(function(k){ trimmed[k] = RAW_DATA[k]; });
          RAW_DATA = trimmed;
        }

        gParsedData = parseData();
        if (gChart) {
          gChart.data.labels = gParsedData.labels;
          gChart.data.datasets = buildDatasets(gParsedData, gCurrentGroup);
          gChart.update();
          document.getElementById("headerDate").textContent =
            gParsedData.rawLabels[0].slice(5) + " ~ " + gParsedData.rawLabels[gParsedData.rawLabels.length-1].slice(5);
        }
      })
      .catch(function(err) { /* 静默失败 */ });
  } catch (err) { logError("fetchLatest", err); }
}

function init() {
  try {
    if (typeof Chart === "undefined") {
      showError("Chart.js 未加载，请检查网络");
      return;
    }
    gChartArea = document.getElementById("chartArea");
    gCrossLine = document.getElementById("crossLine");
    gClTime = document.getElementById("clTime");
    gTapHint = document.getElementById("tapHint");
    gLegendBar = document.getElementById("legendBar");
    if (!gChartArea) { showError("找不到 #chartArea 元素"); return; }
    renderChart("国际");
    bindTabSwipe();
    bindLegendSwipe();
    bindEvents();
    fetchLatest();
  } catch (err) {
    showError("init 错误: " + (err && err.message ? err.message : err));
  }
}
window.addEventListener("load", init);
</script>
