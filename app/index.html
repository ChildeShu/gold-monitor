<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="洛书">
<meta name="theme-color" content="#0a0a15">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>洛书</title>
<script src="../chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a15;
  --surface: #111122;
  --surface2: #181830;
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.15);
  --gold-glow: rgba(212,175,55,0.06);
  --red: #ff4757;
  --green: #2ed573;
  --text: #e8e8f0;
  --text2: #9999aa;
  --text3: #666680;
  --border: rgba(255,255,255,0.06);
  --radius: 14px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;right:0;bottom:0;
}

/* ── Content ── */
.content{
  flex:1 1 auto;min-height:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
  position:relative;
  padding-top:var(--safe-top);
}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

.page{display:none;min-height:100%;padding-bottom:calc(56px + var(--safe-bottom) + 8px)}
.page.active{display:block}

/* ── Message Card ── */
.msg-list{padding:10px 14px;display:flex;flex-direction:column;gap:10px}
.msg-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  transition:all 0.25s;cursor:pointer;
  position:relative;overflow:hidden;
  animation:msgIn 0.35s ease backwards;
}
.msg-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg, var(--gold), rgba(212,175,55,0.3));
  border-radius:0 2px 2px 0;
}
.msg-card:active{transform:scale(0.985)}

@keyframes msgIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* Card header: tag + time on same line */
.msg-card-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
}
.msg-tag{
  font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;
  letter-spacing:0.5px;
}
.msg-tag.broadcast{background:rgba(212,175,55,0.12);color:var(--gold)}
.msg-tag.alert{background:rgba(255,71,87,0.12);color:var(--red)}
.msg-tag.info{background:rgba(68,138,255,0.12);color:#448aff}
.msg-time{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}

/* Price grid — 直接展示，无冗余标题 */
.price-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;
}
.price-item{
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;padding:3px 0;
}
.price-label{color:var(--text3);font-size:12px}
.price-value{font-weight:700;color:#fff;font-size:14px;font-variant-numeric:tabular-nums}
.price-change{font-size:11px;margin-left:4px;font-weight:600}
.price-change.up{color:var(--red)}
.price-change.down{color:var(--green)}

/* Gold inline helpers */
.gold-inline.up{color:var(--red)}
.gold-inline.down{color:var(--green)}

/* ── Chart Page ── */
.chart-container{
  width:100%;height:100%;
  position:absolute;top:0;left:0;
}
.chart-iframe{
  width:100%;height:100%;border:none;
  background:var(--bg);
}
.chart-loading{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;color:var(--text3);
}
.chart-loading .spinner{
  width:32px;height:32px;border:2px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Bottom Tab Bar ── */
.tab-bar{
  flex-shrink:0;height:56px;
  display:flex;align-items:center;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
  z-index:100;
}
.tab-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;cursor:pointer;
  color:var(--text3);transition:all 0.2s;
  position:relative;
}
.tab-item.active{color:var(--gold)}
.tab-icon{
  width:22px;height:22px;display:flex;
  align-items:center;justify-content:center;
  font-size:18px;transition:transform 0.2s;
}
.tab-item.active .tab-icon{transform:scale(1.1)}
.tab-label{font-size:10px;font-weight:500;letter-spacing:0.3px}
.tab-badge{
  position:absolute;top:2px;right:calc(50% - 18px);
  width:7px;height:7px;background:var(--red);
  border-radius:50%;display:none;
}
.tab-badge.show{display:block}

/* ── Empty State ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 20px;text-align:center;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.35}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty-desc{font-size:12px;color:var(--text3);line-height:1.7;max-width:260px}

/* ── Toast ── */
.toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--surface2);color:var(--text);
  padding:10px 22px;border-radius:20px;font-size:12px;
  border:1px solid var(--border);
  z-index:999;opacity:0;transition:all 0.3s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}

/* Settings panel (keep for future use) */
.settings-backdrop{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6);z-index:200;
  display:none;align-items:flex-end;justify-content:center;
}
.settings-backdrop.open{display:flex}
.settings-panel{
  background:var(--surface);border-radius:18px 18px 0 0;
  width:100%;max-width:480px;padding:24px 20px calc(32px + var(--safe-bottom));
  border-top:1px solid var(--border);
  animation:slideUp 0.3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.settings-handle{
  width:32px;height:4px;background:rgba(255,255,255,0.15);
  border-radius:2px;margin:0 auto 18px;
}
.settings-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:18px;text-align:center}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.settings-label{font-size:13px;color:var(--text2)}
.settings-value{font-size:13px;color:var(--gold);font-weight:500}
.settings-btn{
  width:100%;padding:13px;margin-top:22px;
  background:var(--gold);color:#0a0a15;border:none;
  border-radius:12px;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity 0.2s;
}
.settings-btn:active{opacity:0.8}
</style>
</head>
<body>

<!-- Content Area -->
<div class="content" id="content">
  <!-- Messages Page -->
  <div class="page active" id="page-messages">
    <div class="msg-list" id="msgList"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📨</div>
      <div class="empty-title">暂无消息</div>
      <div class="empty-desc">金价播报将在这里显示<br>等待下一次推送...</div>
    </div>
  </div>

  <!-- Chart Page -->
  <div class="page" id="page-chart">
    <div class="chart-container" id="chartContainer">
      <div class="chart-loading" id="chartLoading">
        <div class="spinner"></div>
        <span style="font-size:12px">加载K线图...</span>
      </div>
      <iframe class="chart-iframe" id="chartIframe"
        src="https://ChildeShu.github.io/gold-monitor/"
        onload="onChartLoaded()"
        style="display:none"></iframe>
    </div>
  </div>
</div>

<!-- Bottom Tab Bar -->
<div class="tab-bar">
  <div class="tab-item active" data-tab="messages" onclick="switchTab('messages')">
    <div class="tab-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </div>
    <span class="tab-label">消息</span>
    <div class="tab-badge" id="msgBadge"></div>
  </div>
  <div class="tab-item" data-tab="chart" onclick="switchTab('chart')">
    <div class="tab-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <span class="tab-label">K线</span>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-backdrop" id="settingsBackdrop" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <div class="settings-handle"></div>
    <div class="title-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <span class="settings-title" style="margin:0">设置</span>
      <span style="font-size:22px;color:var(--text3);cursor:pointer;padding:4px" onclick="closeSettings()">✕</span>
    </div>
    <div class="settings-row">
      <span class="settings-label">通知权限</span>
      <span class="settings-value" id="notifLabel" style="cursor:pointer" onclick="requestNotification()">点击开启</span>
    </div>
    <div class="settings-row" style="border:none">
      <span class="settings-label">自动刷新</span>
      <span class="settings-value">30 秒</span>
    </div>
    <button class="settings-btn" onclick="closeSettings()">完成</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== App State ====================
const APP = {
  messages: [],
  activeTab: 'messages',
  lastMessageId: null,
  pollingInterval: null,
  notifEnabled: false,
};

// ==================== Tab Switching ====================
function switchTab(tab) {
  APP.activeTab = tab;
  document.querySelectorAll('.tab-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.getElementById('page-messages').classList.toggle('active', tab === 'messages');
  document.getElementById('page-chart').classList.toggle('active', tab === 'chart');
  if (tab === 'chart') {
    const iframe = document.getElementById('chartIframe');
    if (iframe.style.display === 'none') iframe.style.display = 'block';
  }
}

// ==================== Messages ====================
async function loadMessages() {
  try {
    const resp = await fetch('/api/messages?_=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (data && data.length > 0) {
      APP.messages = data.sort((a, b) => (b.time || '').localeCompare(a.time || ''));
      // Check for new messages
      if (APP.lastMessageId && APP.messages.length > 0) {
        const latestId = APP.messages[0].id || APP.messages[0].time;
        if (latestId !== APP.lastMessageId) showNotification(APP.messages[0]);
      }
      if (APP.messages.length > 0) APP.lastMessageId = APP.messages[0].id || APP.messages[0].time;
    }
    renderMessages();
    updateBadge();
  } catch (e) {
    console.warn('Load failed:', e.message);
    try {
      const resp2 = await fetch('messages.json?_=' + Date.now());
      if (resp2.ok) {
        const data = await resp2.json();
        APP.messages = data.sort((a, b) => (b.time||'').localeCompare(a.time||''));
        renderMessages();
      }
    } catch(e2) { renderMessages(); }
  }
}

function renderMessages() {
  const list = document.getElementById('msgList');
  const empty = document.getElementById('emptyState');

  if (APP.messages.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = APP.messages.map((msg, i) => {
    const tag = msg.tag || 'broadcast';
    const tagText = tag === 'broadcast' ? '定时播报' : tag === 'alert' ? '价格提醒' : '系统通知';
    const time = formatTime(msg.time || msg.ts);
    const priceData = msg.priceData || null;

    let bodyHtml = '';
    if (priceData) {
      bodyHtml += '<div class="price-grid">';
      if (priceData.au9999) {
        const au = priceData.au9999;
        const c = au.change > 0 ? 'up' : au.change < 0 ? 'down' : '';
        bodyHtml += '<div class="price-item"><span class="price-label">AU9999</span><span><span class="price-value">¥' + au.price.toFixed(2) + '</span>' +
          (au.change !== undefined && au.change !== null ? '<span class="price-change ' + c + '">' + (au.change>0?'+':'') + au.change.toFixed(2) + '</span>' : '') + '</span></div>';
      }
      if (priceData.intl_spot) {
        const isp = priceData.intl_spot;
        bodyHtml += '<div class="price-item"><span class="price-label">国际金价</span><span class="price-value">$' + isp.intl_price.toFixed(2) + '</span></div>';
      }
      if (priceData.boshi_etf) {
        const etf = priceData.boshi_etf;
        const c = etf.change > 0 ? 'up' : etf.change < 0 ? 'down' : '';
        bodyHtml += '<div class="price-item"><span class="price-label">博时黄金ETF</span><span><span class="price-value">¥' + etf.price.toFixed(3) + '</span>' +
          (etf.change !== undefined && etf.change !== null ? '<span class="price-change ' + c + '">' + (etf.change>0?'+':'') + etf.change.toFixed(3) + '</span>' : '') + '</span></div>';
      }
      if (priceData.brands) {
        bodyHtml += '<div class="price-item"><span class="price-label">品牌金价</span><span class="price-value">' + priceData.brands + '</span></div>';
      }
      bodyHtml += '</div>';
    }

    return '<div class="msg-card" style="animation-delay:' + (i*0.04) + 's">' +
      '<div class="msg-card-header">' +
        '<span class="msg-tag ' + tag + '">' + tagText + '</span>' +
        '<span class="msg-time">' + time + '</span>' +
      '</div>' +
      (bodyHtml ? bodyHtml : '<div style="color:var(--text2);font-size:12px;line-height:1.6">' + escapeHtml(msg.body || msg.content || '') + '</div>') +
    '</div>';
  }).join('');
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (!isNaN(d.getTime())) {
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    if (isToday) return h + ':' + m;
    return (d.getMonth()+1) + '/' + d.getDate() + ' ' + h + ':' + m;
  }
  const m = ts.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
  if (m) return parseInt(m[2]) + '/' + parseInt(m[3]) + ' ' + m[4] + ':' + m[5];
  return ts;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function updateBadge() {
  const badge = document.getElementById('msgBadge');
  const recent = APP.messages.find(m => {
    const d = new Date(m.time || m.ts);
    return !isNaN(d.getTime()) && (Date.now() - d.getTime()) < 5 * 60 * 1000;
  });
  badge.classList.toggle('show', !!recent && APP.activeTab !== 'messages');
}

// ==================== Chart ====================
function onChartLoaded() {
  document.getElementById('chartLoading').style.display = 'none';
  document.getElementById('chartIframe').style.display = 'block';
}

// ==================== Notifications ====================
async function requestNotification() {
  if (!('Notification' in window)) { showToast('不支持通知', false); return; }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    APP.notifEnabled = true;
    const el = document.getElementById('notifLabel');
    el.textContent = '已开启 ✓'; el.style.color = 'var(--green)';
    showToast('通知已开启', true);
  } else {
    document.getElementById('notifLabel').textContent = '已拒绝';
    showToast('权限被拒绝', false);
  }
}

function showNotification(msg) {
  if (!APP.notifEnabled || !('Notification' in window) || Notification.permission !== 'granted') return;
  const n = new Notification(msg.title || '金价播报', {
    body: (msg.body || '').replace(/<[^>]*>/g, '').substring(0, 200),
    icon: 'icon-192.png',
    tag: 'gold-monitor',
    renotify: true,
  });
  n.onclick = () => { window.focus(); switchTab('messages'); n.close(); };
  setTimeout(() => n.close(), 12000);
}

// ==================== Toast ====================
let toastTimer;
function showToast(msg, success) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (success ? 'success' : '') + ' show';
  clearTimeout(toastTimer);
  toastTimer = () => t.className = 'toast';
  setTimeout(() => t.className = 'toast', 2200);
}

// ==================== Settings ====================
function openSettings() { document.getElementById('settingsBackdrop').classList.add('open'); }
function closeSettings() { document.getElementById('settingsBackdrop').classList.remove('open'); }

// ==================== Init ====================
function init() {
  if ('Notification' in window && Notification.permission === 'granted') {
    APP.notifEnabled = true;
    const el = document.getElementById('notifLabel');
    el.textContent = '已开启 ✓'; el.style.color = 'var(--green)';
  }
  loadMessages();
  APP.pollingInterval = setInterval(loadMessages, 30000);
  setTimeout(updateBadge, 1000);
  renderMessages();
}
init();

window.addEventListener('focus', () => { loadMessages(); updateBadge(); });

// ==================== Service Worker (PWA) ====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('[SW] registered'))
    .catch(err => console.warn('[SW] failed:', err));
}

// PWA install prompt
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); });
</script>

</body>
</html>
