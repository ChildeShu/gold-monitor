<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
  background:#0e0e1a;color:#e0e0e0;
  -webkit-font-smoothing:antialiased;
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
}
.header{
  flex-shrink:0;padding:7px 14px 3px;
  background:#0e0e1a;position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;height:28px;
}
.header-title{font-size:14px;font-weight:600;color:#fff;letter-spacing:0.3px}
.header-date{font-size:11px;color:#888;font-variant-numeric:tabular-nums}
.tabs{
  flex-shrink:0;display:flex;gap:0;padding:0 6px;
  background:#0e0e1a;position:relative;z-index:9;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,0.04);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:7px 12px 5px;
  font-size:13px;font-weight:500;cursor:pointer;
  color:#666;position:relative;white-space:nowrap;
  transition:color 0.2s;
}
.tab.active{color:#d4af37;font-weight:600}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:12px;right:12px;
  height:2px;background:#d4af37;border-radius:1px;
}
.chart-stage{
  flex:1 1 auto;min-height:0;
  position:relative;width:100%;
  background:#0e0e1a;overflow:hidden;
}
.chart-area{position:absolute;top:0;left:0;right:0;bottom:0;touch-action:none}
canvas#chart{width:100%!important;height:100%!important;display:block;touch-action:none}

/* 竖线/圆点/价格标签全部由 Canvas 插件绘制，无需 CSS 覆盖层 */

.legend-bar{
  flex-shrink:0;display:flex;gap:4px;
  padding:5px 8px;background:#0e0e1a;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  border-top:1px solid rgba(255,255,255,0.04);
}
.legend-bar::-webkit-scrollbar{display:none}
.legend-item{
  flex-shrink:0;display:flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:10px;font-size:10px;cursor:pointer;
  background:rgba(255,255,255,0.04);border:1px solid transparent;
  transition:all 0.15s;color:#888;
}
.legend-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-item.active{color:#fff;border-color:rgba(212,175,55,0.4);background:rgba(212,175,55,0.08)}
.legend-item.dimmed{opacity:0.3}

.tap-hint{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:12px;color:#444;
  pointer-events:none;text-align:center;line-height:1.6;
  transition:opacity 0.3s;z-index:5;
}
</style>
</head>

/* ===== 滑动高亮覆盖层：独立 canvas，只在滑动时重绘这一层（不触发整图重绘），保证丝滑 ===== */
var gOverlay = null;
var gOverlayCtx = null;

function ensureOverlay() {
  try {
    if (!gChart) return false;
    var base = gChart.canvas;
    var rect = base.getBoundingClientRect ? base.getBoundingClientRect() : null;
    var cssW = base.clientWidth || (rect ? rect.width : 0);
    var cssH = base.clientHeight || (rect ? rect.height : 0);
    if (!cssW || !cssH) return false;
    var dpr = window.devicePixelRatio || 1;
    if (!gOverlay) {
      gOverlay = document.createElement("canvas");
      gOverlay.id = "crosshairOverlay";
      gOverlay.style.position = "absolute";
      gOverlay.style.top = "0";
      gOverlay.style.left = "0";
      gOverlay.style.pointerEvents = "none";
      gOverlay.style.zIndex = "4";
      if (base.parentNode) base.parentNode.appendChild(gOverlay);
      gOverlayCtx = gOverlay.getContext("2d");
    }
    var bw = Math.round(cssW * dpr);
    var bh = Math.round(cssH * dpr);
    if (gOverlay.width !== bw || gOverlay.height !== bh) {
      gOverlay.width = bw;
      gOverlay.height = bh;
      gOverlay.style.width = cssW + "px";
      gOverlay.style.height = cssH + "px";
    }
    /* 主图已按 dpr 预缩放，覆盖层用同样变换，绘制坐标用 CSS(逻辑)像素 */
    gOverlayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return true;
  } catch (err) { logError("ensureOverlay", err); return false; }
}

/* 竖直标签防重叠布局：items 已按 ptY 升序，返回每个标签的 top（CSS 像素） */
function layoutLabels(items, ca, lh, minGap) {
  var n = items.length;
  if (n === 0) return [];
  var tops = new Array(n);
  for (var i = 0; i < n; i++) tops[i] = items[i].ptY - lh / 2;
  /* 向下推开，避免与上一个重叠 */
  for (var i = 1; i < n; i++) {
    if (tops[i] < tops[i - 1] + lh + minGap) tops[i] = tops[i - 1] + lh + minGap;
  }
  /* 若超出底部，整体上移 */
  var overflow = (tops[n - 1] + lh) - (ca.bottom - 2);
  if (overflow > 0) {
    for (var j = 0; j < n; j++) tops[j] -= overflow;
  }
  /* 若顶部超出，整体下移并重新向下推开 */
  if (tops[0] < ca.top + 2) {
    var shift = (ca.top + 2) - tops[0];
    for (var k = 0; k < n; k++) tops[k] += shift;
    for (var m = 1; m < n; m++) {
      if (tops[m] < tops[m - 1] + lh + minGap) tops[m] = tops[m - 1] + lh + minGap;
    }
  }
  return tops;
}

function drawOverlay() {
  try {
    if (!gChart || !gChart.chartArea) return;
    if (!gCrossActive) { clearOverlay(); return; }
    if (!ensureOverlay()) return;
    var ctx = gOverlayCtx;
    var ca = gChart.chartArea;
    if (!ca) return;

    /* 清空（用设备像素，避免残留） */
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, gOverlay.width, gOverlay.height);
    ctx.restore();

    var crossX = gCrossX;
    if (typeof crossX === "number") {
      /* 竖线（金色虚线，全高） */
      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([4, 4]);
      ctx.lineWidth = 1;
      ctx.strokeStyle = "rgba(212,175,55,0.85)";
      ctx.moveTo(crossX, ca.top);
      ctx.lineTo(crossX, ca.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      /* 时间标签（绘制在图表区内部底部，避免被像素比缩放裁切） */
      if (gCrossTimeText) {
        ctx.font = 'bold 10px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif';
        var tw = ctx.measureText(gCrossTimeText).width + 14;
        var th = 16;
        var bx = crossX - tw / 2;
        if (bx < ca.left + 2) bx = ca.left + 2;
        if (bx + tw > ca.right - 2) bx = ca.right - tw - 2;
        var by = ca.bottom - th - 4;
        if (by < ca.top + 2) by = ca.top + 2;
        ctx.fillStyle = "rgba(212,175,55,0.95)";
        roundRect(ctx, bx, by, tw, th, 4);
        ctx.fill();
        ctx.fillStyle = "#0e0e1a";
        ctx.textBaseline = "middle";
        ctx.textAlign = "center";
        ctx.fillText(gCrossTimeText, bx + tw / 2, by + th / 2);
        ctx.textAlign = "left";
      }
    }

    /* 圆点 + 价格标签（防重叠） */
    if (gHighlightItems && gHighlightItems.length > 0) {
      var lh = 20, minGap = 2;
      var items = gHighlightItems.slice().sort(function(a, b) { return a.ptY - b.ptY; });
      var tops = layoutLabels(items, ca, lh, minGap);
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var labelY = tops[i];

        /* 圆点（画在原始数据点位置） */
        ctx.beginPath();
        ctx.arc(item.ptX, item.ptY, 5, 0, Math.PI * 2);
        ctx.fillStyle = item.color;
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#ffffff";
        ctx.stroke();

        var text = item.value.toFixed(item.decimals) + " " + item.unit;
        ctx.font = 'bold 11px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif';
        ctx.textAlign = "left";
        var lw = ctx.measureText(text).width + 24;
        var labelX = item.ptX + 10;
        if (labelX + lw > ca.right - 4) labelX = item.ptX - lw - 10;
        if (labelX < ca.left + 4) labelX = ca.left + 4;

        /* 标签框 */
        ctx.beginPath();
        var r = 4;
        ctx.moveTo(labelX + r, labelY);
        ctx.lineTo(labelX + lw - r, labelY);
        ctx.quadraticCurveTo(labelX + lw, labelY, labelX + lw, labelY + r);
        ctx.lineTo(labelX + lw, labelY + lh - r);
        ctx.quadraticCurveTo(labelX + lw, labelY + lh, labelX + lw - r, labelY + lh);
        ctx.lineTo(labelX + r, labelY + lh);
        ctx.quadraticCurveTo(labelX, labelY + lh, labelX, labelY + lh - r);
        ctx.lineTo(labelX, labelY + r);
        ctx.quadraticCurveTo(labelX, labelY, labelX + r, labelY);
        ctx.closePath();
        ctx.fillStyle = "rgba(14,14,26,0.94)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 1;
        ctx.stroke();

        /* 标签内色点 */
        ctx.beginPath();
        ctx.arc(labelX + 10, labelY + lh / 2, 3, 0, Math.PI * 2);
        ctx.fillStyle = item.color;
        ctx.fill();

        /* 标签文字 */
        ctx.fillStyle = item.color;
        ctx.textBaseline = "middle";
        ctx.fillText(text, labelX + 18, labelY + lh / 2);
      }
    }
    ctx.textAlign = "left";
  } catch (err) { logError("drawOverlay", err); }
}

function clearOverlay() {
  try {
    if (!gOverlay || !gOverlayCtx) return;
    gOverlayCtx.save();
    gOverlayCtx.setTransform(1, 0, 0, 1, 0, 0);
    gOverlayCtx.clearRect(0, 0, gOverlay.width, gOverlay.height);
    gOverlayCtx.restore();
  } catch (err) { logError("clearOverlay", err); }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ===== 数据解析 ===== */
function parseData() {
  try {
    var labels = [], datasets = {};
    for (var gi in GROUPS)
      for (var si in GROUPS[gi].series) datasets[GROUPS[gi].series[si].key] = [];
    var allKeys = Object.keys(RAW_DATA).sort();
    allKeys.forEach(function(k){
      var d = RAW_DATA[k]; labels.push(k);
      if (d && d.intl_spot) {
        datasets["intl_spot_cny"].push(d.intl_spot.cny_price || null);
        datasets["intl_spot_usd"].push(d.intl_spot.intl_price || null);
      } else { datasets["intl_spot_cny"].push(null); datasets["intl_spot_usd"].push(null); }
      datasets["au9999"].push(d && d.au9999 ? d.au9999.price : null);
      datasets["boshi_etf"].push(d && d.boshi_etf ? d.boshi_etf.price * 100 : null);
      var fc = ["002610","000216","002963","000218","000929"];
      if (d && d.gold_funds) {
        fc.forEach(function(c){ datasets["fund_"+c].push(d.gold_funds[c]?d.gold_funds[c].gold_price:null); });
      } else { fc.forEach(function(c){ datasets["fund_"+c].push(null); }); }
      var found = {};
      if (d && d.brands) {
        for (var b in d.brands) { if(!b) continue; var k2="brand_"+b; if(datasets[k2]!==undefined){ datasets[k2].push(d.brands[b]); found[k2]=true; } }
        for (var gi in GROUPS) for (var si in GROUPS[gi].series) { var s=GROUPS[gi].series[si]; if(s.key.indexOf("brand_")===0 && !found[s.key]) datasets[s.key].push(null); }
      } else {
        for (var gi in GROUPS) for (var si in GROUPS[gi].series) { if(GROUPS[gi].series[si].key.indexOf("brand_")===0) datasets[GROUPS[gi].series[si].key].push(null); }
      }
    });
    return { labels: labels, rawLabels: labels, datasets: datasets };
  } catch (err) {
    logError("parseData", err);
    return { labels: [], rawLabels: [], datasets: {} };
  }
}

/* ===== 构建 dataset ===== */
function buildDatasets(data, groupName) {
  var group = GROUPS[groupName];
  return group.series.map(function(s){
    return {
      label: s.label, data: data.datasets[s.key],
      borderColor: s.color, backgroundColor: s.color + "15",
      borderWidth: 1.8, pointRadius: 0, pointHoverRadius: 4,
      pointHoverBackgroundColor: s.color, pointHoverBorderColor: "#fff", pointHoverBorderWidth: 1.5,
      tension: 0.3, fill: false,
      yAxisID: s.axis, spanGaps: false,
      unit: s.unit, decimals: s.decimals, seriesKey: s.key
    };
  });
}

/* ===== 错误显示工具 ===== */
function showError(msg) {
  var eb = document.getElementById("errorBox");
  var ta = document.getElementById("tapHint");
  if (eb) { eb.textContent = "\u274C " + msg; eb.style.display = "inline"; }
  if (ta) { ta.style.opacity = "1"; }
  console.error(msg);
}
function logError(prefix, err) {
  console.error(prefix, err);
  try {
    var stack = err && err.stack ? err.stack : String(err);
    showError(prefix + " " + (err && err.message ? err.message : err) + (stack ? " | " + stack.split("\n").slice(0,2).join(" ") : ""));
  } catch (_) {}
}
window.addEventListener("error", function(e){
  var msg = e.message || "";
  if (msg === "Script error." || (!e.filename && !e.lineno)) {
    showError("页面脚本异常，请尝试刷新。若持续出现请截图反馈。");
  } else {
    showError("全局错误: " + msg + " @ " + (e.filename||"") + ":" + (e.lineno||""));
  }
  console.error("window.onerror", e);
});
window.addEventListener("unhandledrejection", function(e){
  showError("Promise 错误: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
});

/* ===== 渲染图表 ===== */
function renderChart(groupName) {
  try {
    if (gRafId) { cancelAnimationFrame(gRafId); gRafId = null; }
    gPendingCssX = null;
    gIsDown = false;
    gCurrentGroup = groupName;
    gParsedData = parseData();
    if (gChart) { gChart.destroy(); gChart = null; }
    var ctx = document.getElementById("chart").getContext("2d");
    gChart = new Chart(ctx, {
      type: "line",
      data: { labels: gParsedData.labels, datasets: buildDatasets(gParsedData, groupName) },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        layout: { padding: { top: 8, right: 10, bottom: 4, left: 6 } },
        interaction: { mode: "index", axis: "x", intersect: false },
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: getScales(groupName),
        events: []
      }
    });
    document.getElementById("headerDate").textContent =
      gParsedData.rawLabels[0].slice(5) + " ~ " + gParsedData.rawLabels[gParsedData.rawLabels.length-1].slice(5);
    renderTabs();
    renderLegendBar();
    gLastCrossIdx = -1;
    removeCrosshairDetails();
    if (gTapHint) gTapHint.style.opacity = "1";
  } catch (err) {
    logError("renderChart", err);
  }
}

/* ===== Tabs ===== */
function renderTabs() {
  var tabs = document.getElementById("tabs");
  var keys = Object.keys(GROUPS);
  tabs.innerHTML = keys.map(function(k){
    return '<div class="tab' + (k === gCurrentGroup ? " active" : "") + '" data-group="' + k + '">' + GROUPS[k].label + '</div>';
  }).join("");
  [].forEach.call(tabs.querySelectorAll(".tab"), function(el){
    el.addEventListener("click", function(e){
      try {
        if (gTabSwipeHandled) { gTabSwipeHandled = false; return; }
        renderChart(el.dataset.group);
      } catch (err) { logError("tab click", err); }
    });
  });
}

/* ===== Legend ===== */
function renderLegendBar() {
  var group = GROUPS[gCurrentGroup];
  var bar = document.getElementById("legendBar");
  bar.innerHTML = group.series.map(function(s){
    var isActive = !gHighlightedSeries || gHighlightedSeries === s.key;
    return '<div class="legend-item' + (isActive ? " active" : "") + (!isActive ? " dimmed" : "") + '" data-key="' + s.key + '">' +
      '<span class="dot" style="background:' + s.color + '"></span>' + s.label + '</div>';
  }).join("");
  [].forEach.call(bar.querySelectorAll(".legend-item"), function(el){
    el.addEventListener("click", function(){
      try { toggleHighlight(el.dataset.key); } catch (err) { logError("legend click", err); }
    });
  });
}

function toggleHighlight(key) {
  try {
    gHighlightedSeries = (gHighlightedSeries === key) ? null : key;
    gChart.data.datasets.forEach(function(ds, i){
      var meta = gChart.getDatasetMeta(i);
      meta.hidden = (!gHighlightedSeries || ds.seriesKey === gHighlightedSeries) ? false : true;
    });
    gChart.update();
    renderLegendBar();
  } catch (err) {
    logError("toggleHighlight", err);
  }
}

/* ===== 竖线 + 圆点 + 价格标签（全部 Canvas 绘制，canvas 内部像素空间） ===== */

/*
 * onMove 传入的是 CSS 像素 X（相对 canvas 左边缘）。
 * 这里统一转成 canvas 内部像素再找 idx。
 */
/*
 * getFractionalIndexAtCanvasX -- 把 canvas 内部像素 X 映射成「分数索引」
 * f∈[0, n-1]，即数据点之间的连续位置。滑动时竖线/圆点直接跟随 f，
 * 不再吸附到整数点，从而消除「从一个数据点跳到下一个」的生硬感。
 * 采用分段线性映射，对数据点不等距分布也精确且连续。
 */
function getFractionalIndexAtCanvasX(canvasX) {
  var xs = gChart.scales.x;
  if (!xs) return 0;
  var n = gChart.data.labels.length;
  if (n <= 1) return 0;
  var L = xs.getPixelForValue(0);
  if (canvasX <= L) return 0;
  var R = xs.getPixelForValue(n - 1);
  if (canvasX >= R) return n - 1;
  for (var i = 0; i < n - 1; i++) {
    var p0 = xs.getPixelForValue(i);
    var p1 = xs.getPixelForValue(i + 1);
    if (canvasX <= p1) {
      var span = p1 - p0;
      var frac = span !== 0 ? (canvasX - p0) / span : 0;
      return i + Math.max(0, Math.min(1, frac));
    }
  }
  return n - 1;
}

/*
 * collectHighlightData(f) -- 分数索引处的圆点数据。
 * 圆点 X 跟随手指连续位置 gCrossX（与竖线重合）；
 * 圆点 Y 在相邻两个数据点之间线性插值，因此圆点始终贴着数据线平滑滑动。
 */
function collectHighlightData(f) {
  try {
    if (!gChart || !gParsedData) return;
    var chart = gChart;
    var group = GROUPS[gCurrentGroup];
    var xScale = chart.scales.x;
    if (!xScale) return;
    var n = gChart.data.labels.length;
    if (n <= 0) return;

    var idx0 = Math.floor(f);
    if (idx0 < 0) idx0 = 0;
    if (idx0 > n - 1) idx0 = n - 1;
    var idx1 = idx0 + 1;
    if (idx1 > n - 1) idx1 = n - 1;
    var frac = f - idx0;
    if (frac < 0) frac = 0; else if (frac > 1) frac = 1;
    var crossX = (typeof gCrossX === "number") ? gCrossX : xScale.getPixelForValue(idx0);

    gHighlightItems = [];
    for (var si = 0; si < group.series.length; si++) {
      var s = group.series[si];
      var dsIdx = -1;
      for (var di = 0; di < chart.data.datasets.length; di++) {
        if (chart.data.datasets[di].seriesKey === s.key) { dsIdx = di; break; }
      }
      if (dsIdx < 0) continue;
      var meta = chart.getDatasetMeta(dsIdx);
      if (meta && meta.hidden) continue;
      var arr = gParsedData.datasets[s.key];
      var v0 = arr[idx0], v1 = arr[idx1];
      var yScale = chart.scales[s.axis];
      if (!yScale) continue;

      var val, py;
      if (v0 === null || v0 === undefined || v1 === null || v1 === undefined) {
        /* 某一端缺数据：退化为最近一端的值 */
        val = (frac < 0.5) ? v0 : v1;
        if (val === null || val === undefined) continue;
        py = yScale.getPixelForValue(val);
      } else {
        val = v0 + (v1 - v0) * frac;
        py = yScale.getPixelForValue(val);
      }
      if (typeof py !== "number" || !isFinite(py)) continue;

      gHighlightItems.push({
        key: s.key,
        color: s.color,
        value: val,
        decimals: s.decimals,
        unit: s.unit,
        ptX: crossX,
        ptY: py
      });
    }
    /* 按 Y 排序（从上到下绘制，配合防重叠布局） */
    gHighlightItems.sort(function(a, b){ return a.ptY - b.ptY; });
  } catch (err) {
    logError("collectHighlightData", err);
  }
}

/*
 * updateCrosshair(cssX) -- 连续更新十字线。
 * 竖线 X 直接跟随手指（CSS 像素，已被 chartArea 夹紧），不再吸附整点；
 * 圆点用分数索引在相邻数据点间插值 → 整体随手指平滑移动，消除跳点生硬感。
 */
function updateCrosshair(cssX) {
  try {
    if (!gChart || !gChart.chartArea || !gParsedData) return;
    var ca = gChart.chartArea;
    var clampedX = Math.max(ca.left, Math.min(cssX, ca.right));
    var n = gChart.data.labels.length;
    if (n <= 0) return;

    /* 竖线：跟随手指连续位置（丝滑关键） */
    gCrossX = clampedX;
    gCrossActive = true;

    /* 时间文本：取最近的数据点 */
    var f = getFractionalIndexAtCanvasX(clampedX);
    var idx = Math.round(f);
    if (idx < 0) idx = 0;
    if (idx > n - 1) idx = n - 1;
    var label = gParsedData.rawLabels[idx];
    if (label) {
      var p = label.split(" ");
      gCrossTimeText = p[0].slice(5) + " " + (p[1] || "").slice(0,5);
    } else {
      gCrossTimeText = "";
    }

    collectHighlightData(f);
    drawOverlay();
    if (gTapHint) gTapHint.style.opacity = "0";
  } catch (err) {
    logError("updateCrosshair", err);
  }
}


function removeCrosshairDetails() {
  try {
    gCrossActive = false;
    gCrossX = null;
    gCrossTimeText = "";
    gHighlightItems = [];
    clearOverlay();
  } catch (err) {
    logError("removeCrosshairDetails", err);
  }
}


/* ===== Tab 栏左右滑动切换 ===== */
function bindTabSwipe() {
  var tabs = document.getElementById("tabs");
  var startX = 0, startY = 0;
  var SWIPE_THRESHOLD = 50;

  tabs.addEventListener("touchstart", function(e){
    try {
      if (!e.touches || e.touches.length === 0) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    } catch (err) { logError("tab touchstart", err); }
  }, {passive: true});

  tabs.addEventListener("touchend", function(e){
    try {
      if (startX === 0) return;
      if (!e.changedTouches || e.changedTouches.length === 0) { startX = 0; return; }
      var endX = e.changedTouches[0].clientX;
      var endY = e.changedTouches[0].clientY;
      var dx = endX - startX;
      var dy = endY - startY;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE_THRESHOLD) {
        var keys = Object.keys(GROUPS);
        var idx = keys.indexOf(gCurrentGroup);
        if (idx < 0) { startX = 0; return; }
        gTabSwipeHandled = true;
        if (dx < 0 && idx < keys.length - 1) {
          renderChart(keys[idx + 1]);
        } else if (dx > 0 && idx > 0) {
          renderChart(keys[idx - 1]);
        } else {
          gTabSwipeHandled = false;
        }
      }
      startX = 0;
    } catch (err) { logError("tab touchend", err); startX = 0; }
  }, {passive: true});
}

function bindLegendSwipe() {
  var bar = document.getElementById("legendBar");
  if (!bar) return;
  var startX = 0, startY = 0;
  var SWIPE_THRESHOLD = 40;

  bar.addEventListener("touchstart", function(e){
    try {
      if (!e.touches || e.touches.length === 0) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    } catch (err) { logError("legend touchstart", err); }
  }, {passive: true});

  bar.addEventListener("touchend", function(e){
    try {
      if (startX === 0) return;
      if (!e.changedTouches || e.changedTouches.length === 0) { startX = 0; return; }
      var endX = e.changedTouches[0].clientX;
      var endY = e.changedTouches[0].clientY;
      var dx = endX - startX;
      var dy = endY - startY;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE_THRESHOLD) {
        var group = GROUPS[gCurrentGroup];
        var keys = group.series.map(function(s){ return s.key; });
        if (keys.length === 0) { startX = 0; return; }
        var idx = keys.indexOf(gHighlightedSeries);

        if (dx < 0) {
          idx = (idx + 1 >= keys.length) ? 0 : idx + 1;
        } else {
          idx = (idx - 1 < 0) ? keys.length - 1 : idx - 1;
        }
        toggleHighlight(keys[idx]);
      }
      startX = 0;
    } catch (err) { logError("legend touchend", err); startX = 0; }
  }, {passive: true});
}

/* ===== 触摸 / 鼠标事件 ===== */
function bindEvents() {
  if (!gChartArea) return;

  function getCssXFromTouch(e) {
    try {
      if (e.touches && e.touches.length > 0 && gChart && gChart.canvas) {
        return e.touches[0].clientX - gChart.canvas.getBoundingClientRect().left;
      }
    } catch (err) { logError("getCssXFromTouch", err); }
    return null;
  }
  function getCssXFromMouse(e) {
    try {
      if (gChart && gChart.canvas) {
        return e.clientX - gChart.canvas.getBoundingClientRect().left;
      }
    } catch (err) { logError("getCssXFromMouse", err); }
    return null;
  }

  function scheduleMove(cssX) {
    gPendingCssX = cssX;
    if (gRafId) return;
    gRafId = requestAnimationFrame(function(){
      gRafId = null;
      var x = gPendingCssX;
      gPendingCssX = null;
      if (x !== null) onMove(x);
    });
  }

  gChartArea.addEventListener("touchstart", function(e){
    try {
      if (!e.touches || e.touches.length === 0) return;
      gIsDown = true;
      clearTimeout(gHideTimer);
      var cssX = getCssXFromTouch(e);
      if (cssX !== null) scheduleMove(cssX);
      if (e.cancelable) e.preventDefault();
    } catch (err) { logError("chart touchstart", err); }
  }, {passive:false});

  /* touchmove/touchend 绑在 document 上，防止手指滑出 chartArea 后丢失追踪 */
  /* touchmove back on chartArea to avoid passive:false error in WeChat */
  gChartArea.addEventListener("touchmove", function(e){
    try {
      if (!gIsDown || !e.touches || e.touches.length === 0) return;
      var cssX = getCssXFromTouch(e);
      if (cssX !== null) scheduleMove(cssX);
      /* touch-action:none already prevents default scroll */
    } catch (err) { logError("chart touchmove", err); }
  }, {passive:true});

  gChartArea.addEventListener("touchend", function(e){
    try { onEnd(); } catch (err) { logError("chart touchend", err); }
  });
  gChartArea.addEventListener("touchcancel", function(e){
    try { onEnd(); } catch (err) { logError("chart touchcancel", err); }
  });

  gChartArea.addEventListener("mousedown", function(e){
    try {
      gIsDown = true;
      clearTimeout(gHideTimer);
      var x = getCssXFromMouse(e);
      if (x !== null) onMove(x);
    } catch (err) { logError("chart mousedown", err); }
  });

  document.addEventListener("mousemove", function(e){
    try {
      if (!gIsDown) return;
      var x = getCssXFromMouse(e);
      if (x !== null) scheduleMove(x);
    } catch (err) { logError("document mousemove", err); }
  });

  document.addEventListener("mouseup", function(e){
    try { onEnd(); } catch (err) { logError("document mouseup", err); }
  });
  document.addEventListener("mouseleave", function(e){
    try { if (gIsDown) onEnd(); } catch (err) { logError("document mouseleave", err); }
  });
}

function onMove(cssX) {
  try {
    /* cssX 已是「相对 canvas 左边缘」的 CSS(逻辑)像素，
       与 getPixelForValue() / chartArea 同一空间，直接比较即可（绝不乘 dpr）。
       连续更新竖线/圆点，随手指平滑滑动。 */
    updateCrosshair(cssX);
  } catch (err) {
    logError("onMove", err);
  }
}

function onEnd() {
  try {
    gIsDown = false;
    clearTimeout(gHideTimer);
    gHideTimer = setTimeout(function(){
      try {
        removeCrosshairDetails();
        gLastCrossIdx = -1;
        if (gTapHint) gTapHint.style.opacity = "1";
      } catch (err) { logError("onEnd timeout", err); }
    }, 2000);
  } catch (err) {
    logError("onEnd", err);
  }
}

/* ===== 页面加载后自动刷新最新数据 ===== */
function fetchLatest() {
  try {
    if (typeof fetch === "undefined") return;
    var url = "latest.json?_t=" + Date.now();
    fetch(url, { cache: "no-store" })
      .then(function(r) { return r.json(); })
      .then(function(latest) {
        if (!latest || typeof latest !== "object") return;
        var keys = Object.keys(latest);
        if (keys.length === 0) return;
        var latestKey = keys[0];
        var latestData = latest[latestKey];
        if (!latestData) return;

        var rawKeys = Object.keys(RAW_DATA);
        if (rawKeys.length === 0) {
          RAW_DATA[latestKey] = latestData;
        } else {
          var lastKey = rawKeys[rawKeys.length - 1];
          if (latestKey > lastKey) {
            RAW_DATA[latestKey] = latestData;
          } else if (latestKey === lastKey) {
            RAW_DATA[latestKey] = latestData;
          }
        }

        var all = Object.keys(RAW_DATA).sort();
        if (all.length > 1000) {
          var keep = all.slice(-1000);
          var trimmed = {};
          keep.forEach(function(k){ trimmed[k] = RAW_DATA[k]; });
          RAW_DATA = trimmed;
        }

        gParsedData = parseData();
        if (gChart) {
          gChart.data.labels = gParsedData.labels;
          gChart.data.datasets = buildDatasets(gParsedData, gCurrentGroup);
          gChart.update();
          document.getElementById("headerDate").textContent =
            gParsedData.rawLabels[0].slice(5) + " ~ " + gParsedData.rawLabels[gParsedData.rawLabels.length-1].slice(5);
        }
      })
      .catch(function(err) { /* 静默失败 */ });
  } catch (err) { logError("fetchLatest", err); }
}

function init() {
  try {
    if (typeof Chart === "undefined") {
      showError("Chart.js 未加载，请检查网络");
      return;
    }
    gChartArea = document.getElementById("chartArea");
    gTapHint = document.getElementById("tapHint");
    gLegendBar = document.getElementById("legendBar");
    if (!gChartArea) { showError("找不到 #chartArea 元素"); return; }
    renderChart("国际");
    bindTabSwipe();
    bindLegendSwipe();
    bindEvents();
    fetchLatest();
  } catch (err) {
    showError("init 错误: " + (err && err.message ? err.message : err));
  }
}
window.addEventListener("load", init);
</script>
