<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>金价走势 · 近一周</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js">
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;
  background:#1a1a2e;color:#e0e0e0;min-height:100vh;overflow-x:hidden;
}
.header{
  padding:20px 16px 12px;text-align:center;
  background:linear-gradient(180deg,#16213e 0%,#1a1a2e 100%);
  position:sticky;top:0;z-index:100;
}
.header h1{font-size:20px;color:#d4af37;font-weight:600;letter-spacing:1px}
.header .sub{font-size:12px;color:#888;margin-top:4px}
.header .update-time{font-size:11px;color:#666;margin-top:2px}

/* 分组标签 */
.tabs{
  display:flex;gap:6px;padding:0 12px 8px;overflow-x:auto;
  background:#1a1a2e;position:sticky;top:82px;z-index:99;
  -webkit-overflow-scrolling:touch;
}
.tab{
  flex-shrink:0;padding:8px 16px;border-radius:20px;
  font-size:13px;font-weight:500;cursor:pointer;
  background:#16213e;color:#888;border:1px solid #2a2a4a;
  transition:all 0.2s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.tab.active{background:#d4af37;color:#1a1a2e;border-color:#d4af37;font-weight:600}

/* 图例 - 可点击高亮 */
.legend-wrap{
  padding:8px 12px;display:flex;flex-wrap:wrap;gap:6px;
  background:#1a1a2e;position:sticky;top:132px;z-index:98;
  max-height:200px;overflow-y:auto;
}
.legend-item{
  display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:14px;font-size:11px;cursor:pointer;
  background:#16213e;border:1px solid transparent;
  transition:all 0.2s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.legend-item .dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.legend-item.active{border-color:#d4af37;background:#1e2a40}
.legend-item.dimmed{opacity:0.35}

/* 图表区 */
.chart-container{
  position:relative;width:100%;height:420px;
  padding:8px 8px 16px;margin:0 auto;max-width:800px;
}
canvas{width:100%!important;height:100%!important}

/* 详情提示 */
.tooltip-native{
  position:fixed;bottom:0;left:0;right:0;
  background:#16213e;border-top:2px solid #d4af37;
  padding:16px;transform:translateY(100%);
  transition:transform 0.3s;z-index:200;
  box-shadow:0 -4px 20px rgba(0,0,0,0.5);
}
.tooltip-native.show{transform:translateY(0)}
.tooltip-native .date{font-size:15px;color:#d4af37;font-weight:600;margin-bottom:8px}
.tooltip-native .values{display:flex;flex-wrap:wrap;gap:6px}
.tooltip-native .val-chip{
  padding:4px 10px;border-radius:10px;font-size:12px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;gap:4px;
}
.tooltip-native .val-chip .c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tooltip-native .swipe-hint{
  font-size:11px;color:#666;margin-top:10px;text-align:center;
}
.footer{
  text-align:center;padding:20px 16px 30px;font-size:11px;color:#555;
}
.footer a{color:#d4af37;text-decoration:none}
</style>
</head>
<body>

<div class="header">
  <h1>金价走势 · 近一周</h1>
  <div class="sub" id="rangeText"></div>
  <div class="update-time" id="updateTime"></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="legend-wrap" id="legend"></div>
<div class="chart-container">
  <canvas id="chart"></canvas>
</div>
<div class="tooltip-native" id="tooltip">
  <div class="date" id="tipDate"></div>
  <div class="values" id="tipValues"></div>
  <div class="swipe-hint">← 左右滑动查看各时间点 →</div>
</div>
<div class="footer">
  数据来源 东方财富 · dwo.cc · ruseo.cn · 新浪财经<br>
  金价监控自动推送 · <span id="genTime"></span>
</div>

<script>
// ═══ 数据注入 ═══
const RAW_DATA = __DATA_PLACEHOLDER__;
const GEN_TIME = "__GEN_TIME__";

// ═══ 系列分组定义 ═══
const GROUPS = {
  "国际": {
    label: "🌍 国际",
    series: [
      {key:"intl_spot_cny", label:"伦敦金现(人民币)", unit:"元/克", color:"#ff6b6b", decimals:2, yAxisID:"y"},
      {key:"intl_spot_usd", label:"伦敦金现(美元)", unit:"美元/盎司", color:"#ffa502", decimals:1, yAxisID:"y1"},
    ]
  },
  "投资": {
    label: "📊 投资",
    series: [
      {key:"au9999", label:"AU9999现货", unit:"元/克", color:"#2ed573", decimals:2, yAxisID:"y"},
      {key:"boshi_etf", label:"博时黄金ETF", unit:"元/克", color:"#1e90ff", decimals:2, yAxisID:"y"},
    ]
  },
  "基金": {
    label: "📱 基金",
    series: [
      {key:"fund_002610", label:"博时黄金", unit:"元/克", color:"#ff6348", decimals:2, yAxisID:"y"},
      {key:"fund_000216", label:"华安黄金", unit:"元/克", color:"#7bed9f", decimals:2, yAxisID:"y"},
      {key:"fund_002963", label:"易方达黄金", unit:"元/克", color:"#70a1ff", decimals:2, yAxisID:"y"},
      {key:"fund_000218", label:"国泰黄金", unit:"元/克", color:"#ffa502", decimals:2, yAxisID:"y"},
      {key:"fund_000929", label:"博时黄金D", unit:"元/克", color:"#a4b0be", decimals:2, yAxisID:"y"},
    ]
  },
  "品牌": {
    label: "🏪 品牌",
    series: [
      {key:"brand_周大福", label:"周大福", unit:"元/克", color:"#eccc68", decimals:0, yAxisID:"y2"},
      {key:"brand_老庙黄金", label:"老庙黄金", unit:"元/克", color:"#ff7f50", decimals:0, yAxisID:"y2"},
      {key:"brand_周六福", label:"周六福", unit:"元/克", color:"#ff6b81", decimals:0, yAxisID:"y2"},
      {key:"brand_老凤祥", label:"老凤祥", unit:"元/克", color:"#a29bfe", decimals:0, yAxisID:"y2"},
      {key:"brand_中国黄金", label:"中国黄金", unit:"元/克", color:"#dfe6e9", decimals:0, yAxisID:"y2"},
      {key:"brand_潮宏基", label:"潮宏基", unit:"元/克", color:"#55efc4", decimals:0, yAxisID:"y2"},
      {key:"brand_金至尊", label:"金至尊", unit:"元/克", color:"#74b9ff", decimals:0, yAxisID:"y2"},
      {key:"brand_谢瑞麟", label:"谢瑞麟", unit:"元/克", color:"#fab1a0", decimals:0, yAxisID:"y2"},
      {key:"brand_六福珠宝", label:"六福珠宝", unit:"元/克", color:"#81ecec", decimals:0, yAxisID:"y2"},
      {key:"brand_周生生", label:"周生生", unit:"元/克", color:"#fdcb6e", decimals:0, yAxisID:"y2"},
    ]
  }
};

// ═══ 解析数据 ═══
function parseData() {
  const labels = [];
  const datasets = {};
  const allKeys = Object.keys(RAW_DATA).sort();

  // 初始化所有系列
  for (const g of Object.values(GROUPS)) {
    for (const s of g.series) {
      datasets[s.key] = [];
    }
  }

  allKeys.forEach(k => {
    const d = RAW_DATA[k];
    labels.push(k);

    // 国际金价
    if (d.intl_spot) {
      datasets["intl_spot_cny"].push(d.intl_spot.cny_price || null);
      datasets["intl_spot_usd"].push(d.intl_spot.intl_price || null);
    } else {
      datasets["intl_spot_cny"].push(null);
      datasets["intl_spot_usd"].push(null);
    }

    // AU9999
    datasets["au9999"].push(d.au9999 ? d.au9999.price : null);

    // 博时ETF
    datasets["boshi_etf"].push(d.boshi_etf ? d.boshi_etf.price * 100 : null);

    // 黄金基金
    if (d.gold_funds) {
      for (const code of ["002610","000216","002963","000218","000929"]) {
        const key = "fund_" + code;
        datasets[key].push(d.gold_funds[code] ? d.gold_funds[code].gold_price : null);
      }
    } else {
      for (const code of ["002610","000216","002963","000218","000929"]) {
        datasets["fund_"+code].push(null);
      }
    }

    // 品牌
    if (d.brands) {
      for (const [brand, price] of Object.entries(d.brands)) {
        if (!brand) continue;
        const key = "brand_" + brand;
        if (datasets[key] !== undefined) {
          datasets[key].push(price);
        }
      }
      // 填充没有的品牌为null
      for (const g of Object.values(GROUPS)) {
        for (const s of g.series) {
          if (s.key.startsWith("brand_") && datasets[s.key].length < labels.length) {
            datasets[s.key].push(null);
          }
        }
      }
    } else {
      for (const g of Object.values(GROUPS)) {
        for (const s of g.series) {
          if (s.key.startsWith("brand_")) datasets[s.key].push(null);
        }
      }
    }
  });

  // 格式化标签
  const fmtLabels = labels.map(l => {
    const parts = l.split(" ");
    return parts[0].slice(5) + " " + parts[1];
  });

  return {labels: fmtLabels, rawLabels: labels, datasets};
}

// ═══ 状态 ═══
let currentGroup = "国际";
let highlightedSeries = null; // 当前高亮的系列key，null表示全部显示
let chart = null;

// ═══ 构建Chart.js datasets ═══
function buildDatasets(data, groupName) {
  const group = GROUPS[groupName];
  return group.series.map(s => ({
    label: s.label,
    data: data.datasets[s.key],
    borderColor: s.color,
    backgroundColor: s.color + "22",
    borderWidth: 2,
    pointRadius: 3,
    pointHoverRadius: 7,
    pointBackgroundColor: s.color,
    pointBorderColor: "#fff",
    pointBorderWidth: 2,
    tension: 0.35,
    fill: false,
    yAxisID: s.yAxisID || "y",
    spanGaps: false,
    // 自定义数据用于tooltip
    unit: s.unit,
    decimals: s.decimals,
    seriesKey: s.key,
  }));
}

// ═══ 获取Y轴配置 ═══
function getYAxes(groupName) {
  const axes = {
    y: { type:"linear", display:true, position:"left",
      title:{display:true,text:"元/克",color:"#888"},
      grid:{color:"rgba(255,255,255,0.05)"},
      ticks:{color:"#aaa",callback:v=>v.toFixed(0)}
    },
    y1: { type:"linear", display:groupName==="国际", position:"right",
      title:{display:true,text:"美元/盎司",color:"#888"},
      grid:{drawOnChartArea:false},
      ticks:{color:"#aaa",callback:v=>v.toFixed(0)}
    },
    y2: { type:"linear", display:groupName==="品牌", position:"right",
      title:{display:true,text:"元/克",color:"#888"},
      grid:{drawOnChartArea:false},
      ticks:{color:"#aaa",callback:v=>v.toFixed(0)},
      min: v => Math.floor((v.min-20)/10)*10,
      max: v => Math.ceil((v.max+20)/10)*10,
    }
  };

  if (groupName === "国际") return [axes.y, axes.y1];
  if (groupName === "品牌") return [axes.y, axes.y2];
  return [axes.y];
}

// ═══ 渲染图表 ═══
function renderChart(groupName) {
  currentGroup = groupName;
  const data = parseData();
  const datasets = buildDatasets(data, groupName);
  const yAxes = getYAxes(groupName);

  if (chart) chart.destroy();

  const ctx = document.getElementById("chart").getContext("2d");
  chart = new Chart(ctx, {
    type: "line",
    data: {labels: data.labels, datasets},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: "index",
        intersect: false,
      },
      plugins: {
        legend: {display: false},
        tooltip: {
          enabled: true,
          mode: "index",
          intersect: false,
          backgroundColor: "rgba(22,33,62,0.95)",
          titleColor: "#d4af37",
          bodyColor: "#e0e0e0",
          borderColor: "#d4af37",
          borderWidth: 1,
          padding: 12,
          callbacks: {
            label: function(ctx) {
              const ds = ctx.dataset;
              const val = ctx.parsed.y;
              const unit = ds.unit || "";
              const dec = ds.decimals || 2;
              return ds.label + ": " + val.toFixed(dec) + " " + unit;
            }
          }
        },
        zoom: {
          pan: {enabled: true, mode:"x"},
          zoom: {wheel:{enabled:true}, pinch:{enabled:true}, mode:"x"}
        }
      },
      scales: {
        x: {
          grid:{color:"rgba(255,255,255,0.05)"},
          ticks:{color:"#aaa",maxRotation:45}
        },
        ...Object.fromEntries(yAxes.map((a,i) => [a.position==="right"?"y"+(i>0?i:""):"y", a]))
      },
      onClick: function(e, elements) {
        if (elements.length > 0) {
          const idx = elements[0].index;
          const ds = elements[0].datasetIndex;
          const seriesKey = chart.data.datasets[ds].seriesKey;
          highlightSeries(seriesKey);
        }
      }
    },
    plugins: [{
      // 触摸滑动回调
      id: "touchHandler",
      afterEvent(chart, args) {
        const evt = args.event;
        if (!evt || !evt.native) return;
        // 检测触摸移动
        if (evt.native.type === "touchmove" || evt.native.type === "mousemove") {
          const points = chart.getElementsAtEventForMode(
            evt.native, "index", {intersect:false}, false
          );
          if (points.length > 0) {
            showNativeTooltip(points[0].index, chart.data);
          }
        }
      }
    }]
  });

  // 更新范围文字
  document.getElementById("rangeText").textContent =
    data.labels[0] + " — " + data.labels[data.labels.length-1];

  // 渲染图例
  renderLegend(groupName);

  // 更新标签激活状态
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.group === groupName);
  });

  // 重置高亮
  highlightedSeries = null;
}

// ═══ 图例 ═══
function renderLegend(groupName) {
  const group = GROUPS[groupName];
  const legend = document.getElementById("legend");
  legend.innerHTML = group.series.map(s => {
    const isActive = !highlightedSeries || highlightedSeries === s.key;
    return `<div class="legend-item${isActive?' active':''}${!isActive?' dimmed':''}"
      data-key="${s.key}" onclick="highlightSeries('${s.key}')">
      <span class="dot" style="background:${s.color}"></span>${s.label}
    </div>`;
  }).join("");
}

// ═══ 高亮某个系列 ═══
function highlightSeries(key) {
  if (highlightedSeries === key) {
    // 取消高亮
    highlightedSeries = null;
  } else {
    highlightedSeries = key;
  }

  // 更新所有dataset的透明度
  chart.data.datasets.forEach((ds, i) => {
    const meta = chart.getDatasetMeta(i);
    if (!highlightedSeries || ds.seriesKey === highlightedSeries) {
      meta.hidden = false;
    } else {
      meta.hidden = true;
    }
  });
  chart.update();

  // 更新图例
  const group = GROUPS[currentGroup];
  const legend = document.getElementById("legend");
  legend.innerHTML = group.series.map(s => {
    const isActive = !highlightedSeries || highlightedSeries === s.key;
    return `<div class="legend-item${isActive?' active':''}${!isActive?' dimmed':''}"
      data-key="${s.key}" onclick="highlightSeries('${s.key}')">
      <span class="dot" style="background:${s.color}"></span>${s.label}
    </div>`;
  }).join("");

  // 更新底部详情
  if (highlightedSeries && chart) {
    const data = parseData();
    const dsData = data.datasets[highlightedSeries];
    const groupSeries = Object.values(GROUPS).flatMap(g=>g.series);
    const sInfo = groupSeries.find(s=>s.key===highlightedSeries);
    if (sInfo) {
      let html = "";
      data.rawLabels.forEach((l,i) => {
        const v = dsData[i];
        if (v !== null && v !== undefined) {
          html += `<div class="val-chip">
            <span class="c-dot" style="background:${sInfo.color}"></span>
            ${l}: <b>${v.toFixed(sInfo.decimals)} ${sInfo.unit}</b>
          </div>`;
        }
      });
      document.getElementById("tipDate").textContent = sInfo.label + " · 全部数据";
      document.getElementById("tipValues").innerHTML = html;
      document.getElementById("tooltip").classList.add("show");
    }
  } else if (!highlightedSeries) {
    document.getElementById("tooltip").classList.remove("show");
  }
}

// ═══ 原生tooltip（触摸滑动时显示） ═══
let tooltipTimeout;
function showNativeTooltip(index, chartData) {
  clearTimeout(tooltipTimeout);
  const data = parseData();
  const rawLabel = data.rawLabels[index];
  const group = GROUPS[currentGroup];

  let html = "";
  group.series.forEach(s => {
    const val = data.datasets[s.key][index];
    if (val !== null && val !== undefined) {
      html += `<div class="val-chip">
        <span class="c-dot" style="background:${s.color}"></span>
        ${s.label}: <b>${val.toFixed(s.decimals)} ${s.unit}</b>
      </div>`;
    }
  });

  document.getElementById("tipDate").textContent = rawLabel;
  document.getElementById("tipValues").innerHTML = html;
  document.getElementById("tooltip").classList.add("show");

  tooltipTimeout = setTimeout(() => {
    document.getElementById("tooltip").classList.remove("show");
  }, 3000);
}

// ═══ 初始化 ═══
function init() {
  // 渲染标签
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = Object.entries(GROUPS).map(([key,g]) =>
    `<div class="tab${key===currentGroup?' active':''}" data-group="${key}" onclick="renderChart('${key}')">${g.label}</div>`
  ).join("");

  document.getElementById("updateTime").textContent =
    "数据更新至 " + Object.keys(RAW_DATA).sort().pop();
  document.getElementById("genTime").textContent = "生成时间 " + GEN_TIME;

  renderChart("国际");

  // 点击空白区域取消高亮
  document.getElementById("chart").addEventListener("dblclick", function() {
    highlightSeries(null);
  });
}

init();
</script>
</body>
</html>
