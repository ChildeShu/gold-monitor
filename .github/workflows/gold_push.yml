name: 金价每小时播报

on:
  schedule:
    # 北京时间工作日 9:00-15:00 整点 → UTC 1,2,3,4,5,6,7 点，周一到周五
    - cron: "0 1 * * 1-5"
    - cron: "0 2 * * 1-5"
    - cron: "0 3 * * 1-5"
    - cron: "0 4 * * 1-5"
    - cron: "0 5 * * 1-5"
    - cron: "0 6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:  # 支持手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 同步最新 history.json
        run: |
          # gold_save.yml 每 10 分钟推送 history.json 到 main，直接拉取最新
          git fetch origin main
          git checkout origin/main -- history.json
          echo "history.json synced from origin/main"
          # 验证最新 key
          python -c "import json; d=json.load(open('history.json')); ks=sorted(d.keys()); print('latest:', ks[-1], 'au9999:', d[ks[-1]].get('au9999',{}).get('price'))"

      - name: 生成配置文件
        run: |
          python -c "
          import json, os
          config = {
              'notification': {
                  'type': 'wxpusher',
                  'wxpusher_app_token': os.environ['WXPUSHER_APP_TOKEN'],
                  'wxpusher_uids': json.loads(os.environ['WXPUSHER_UIDS']),
                  'wxpusher_content_type': 2,
              },
              'threshold': 0.05,
              'selected_brands': ['周大福', '老庙黄金', '周六福'],
              'trading_hours': {
                  'start': '09:00',
                  'end': '15:00',
                  'weekdays_only': True,
              },
          }
          with open('config.json', 'w') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          print('config.json 生成成功')
          "
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}

      - name: 执行金价推送
        run: python gold_monitor.py --force
        env:
          TZ: Asia/Shanghai

      - name: 部署走势图到 GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 生成 chart HTML 到 /tmp，避免污染 main 分支工作区
          python -c "
          import sys
          sys.path.insert(0, '.')
          from gold_monitor import generate_chart_html
          result = generate_chart_html('/tmp/chart_output.html')
          if result:
              print(f'CHART_GENERATED={result}')
          else:
              print('CHART_GENERATED=none')
              sys.exit(1)
          "
          # 保存最新数据快照（reset --hard 会清除它）—— 供静态页 fetchLatest() 自动刷新
          cp latest.json /tmp/latest_snapshot.json 2>/dev/null || true
          # 部署到 gh-pages（先丢弃工作区临时修改，避免 checkout 冲突）
          git reset --hard || true
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -f gh-pages
            git pull origin gh-pages 2>/dev/null || true
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi
          cp /tmp/chart_output.html index.html
          cp /tmp/latest_snapshot.json latest.json 2>/dev/null || true
          # 禁用 Jekyll，保证页面字节级原样部署（避免任何处理干扰 JS）
          : > .nojekyll
          git add index.html latest.json .nojekyll
          if ! git diff --cached --quiet; then
            git commit -m "Update chart $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            for i in 1 2 3; do
              if git push origin gh-pages; then
                echo "CHART_DEPLOYED=true" >> $GITHUB_ENV
                break
              fi
              echo "Push attempt $i failed, retrying in 10s..."
              sleep 10
            done
          else
            echo "No chart changes"
          fi
        env:
          TZ: Asia/Shanghai
