name: 金价每小时播报

on:
  schedule:
    # 北京时间工作日 9:00-15:00 整点 → UTC 1,2,3,4,5,6,7 点，周一到周五
    # GitHub Actions 多值 cron 不可靠，拆成 7 条独立 schedule
    - cron: "0 1 * * 1-5"
    - cron: "0 2 * * 1-5"
    - cron: "0 3 * * 1-5"
    - cron: "0 4 * * 1-5"
    - cron: "0 5 * * 1-5"
    - cron: "0 6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:  # 支持手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 恢复历史数据缓存
        uses: actions/cache@v4
        with:
          path: history.json
          key: gold-history-${{ github.run_id }}
          restore-keys: |
            gold-history-

      - name: 生成配置文件
        run: |
          python -c "
          import json, os
          config = {
              'notification': {
                  'type': 'wxpusher',
                  'wxpusher_app_token': os.environ['WXPUSHER_APP_TOKEN'],
                  'wxpusher_uids': json.loads(os.environ['WXPUSHER_UIDS']),
                  'wxpusher_content_type': 2,
              },
              'threshold': 0.05,
              'selected_brands': ['周大福', '老庙黄金', '周六福'],
              'trading_hours': {
                  'start': '09:00',
                  'end': '15:00',
                  'weekdays_only': True,
              },
          }
          with open('config.json', 'w') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          print('config.json 生成成功')
          "
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}

      - name: 执行金价推送
        run: python gold_monitor.py --force
        env:
          TZ: Asia/Shanghai

      - name: 部署走势图到 GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 生成 chart HTML 到 /tmp，避免污染 main 分支工作区
          python -c "
          import sys
          sys.path.insert(0, '.')
          from gold_monitor import generate_chart_html
          generate_chart_html('/tmp/chart_output.html')
          "
          # 部署到 gh-pages
          cp /tmp/chart_output.html /tmp/index.html
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
            git pull origin gh-pages 2>/dev/null || true
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi
          cp /tmp/index.html index.html
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "Update chart $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            git push origin gh-pages
            echo "CHART_DEPLOYED=true" >> $GITHUB_ENV
          else
            echo "No chart changes"
          fi
        env:
          TZ: Asia/Shanghai

      # 第二次 cache save 用新 key 保存更新后的 history.json
      - name: 更新历史数据缓存
        uses: actions/cache@v4
        with:
          path: history.json
          key: gold-history-${{ github.run_id }}
